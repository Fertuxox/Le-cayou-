<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rogue Survivor - Ultimate Edition (Boutique Fixe)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e, #060610);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #ui {
            position: fixed;
            top: 15px;
            left: 15px;
            right: 15px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
            pointer-events: none;
            z-index: 10;
            font-size: 13px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .stat-card {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 5px 12px;
            border-left: 3px solid #ffaa44;
            font-family: monospace;
        }

        .hp-bar-bg {
            background: #330000;
            height: 12px;
            width: 200px;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 3px;
        }

        .hp-bar-fill {
            background: linear-gradient(90deg, #ff4444, #ff8888);
            height: 100%;
            width: 100%;
            transition: width 0.2s;
        }

        .xp-bar-bg {
            background: #1a2a1a;
            height: 8px;
            width: 200px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 3px;
        }

        .xp-bar-fill {
            background: linear-gradient(90deg, #44ff44, #aaffaa);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .shop-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffaa44, #ff8844);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            z-index: 100;
            font-family: monospace;
            box-shadow: 0 0 20px rgba(255,170,68,0.5);
            transition: transform 0.2s;
        }

        .shop-btn:hover {
            transform: scale(1.05);
        }

        .shop-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #0f0f1f, #050510);
            border: 3px solid #ffcc44;
            border-radius: 28px;
            padding: 20px;
            color: white;
            text-align: center;
            z-index: 1000;
            width: 650px;
            max-height: 85vh;
            overflow-y: auto;
            font-family: monospace;
            pointer-events: auto;
            box-shadow: 0 0 100px rgba(0,0,0,0.95);
            animation: slideIn 0.3s ease;
        }

        .shop-panel h2 {
            margin-bottom: 15px;
            color: #ffcc44;
        }

        .shop-panel .crystals-display {
            font-size: 24px;
            margin-bottom: 15px;
            color: #ffaa44;
        }

        .shop-category {
            margin: 15px 0 10px;
            padding: 5px;
            background: rgba(255,170,68,0.2);
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #ffcc44;
        }

        .shop-item {
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffaa44;
            border-radius: 10px;
            padding: 8px 12px;
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .shop-item:hover {
            background: rgba(255,170,68,0.2);
            transform: scale(1.01);
        }

        .shop-item .info {
            text-align: left;
            flex: 1;
        }

        .shop-item .name {
            font-weight: bold;
            font-size: 14px;
        }

        .shop-item .desc {
            font-size: 10px;
            color: #aaa;
        }

        .shop-item .price {
            color: #ffaa44;
            font-weight: bold;
            font-size: 16px;
            min-width: 60px;
            text-align: right;
        }

        .shop-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .close-shop {
            background: #ff4444;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .close-shop:hover {
            background: #ff6666;
            transform: scale(1.02);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a0000, #000000);
            border: 3px solid #ff4444;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            z-index: 2000;
            color: white;
            min-width: 350px;
        }

        button {
            background: linear-gradient(135deg, #ff6600, #ff4400);
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .info-text {
            position: fixed;
            bottom: 15px;
            left: 15px;
            color: #ccc;
            font-size: 11px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 10;
        }
        
        .kill-counter {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.8);
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: bold;
            color: #ffaa44;
            backdrop-filter: blur(4px);
            font-size: 16px;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes slideIn {
            from { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
<div id="ui">
    <div class="stat-card">❤️ SANTÉ <div class="hp-bar-bg"><div id="hpFill" class="hp-bar-fill"></div></div></div>
    <div class="stat-card">⭐ XP <div class="xp-bar-bg"><div id="xpFill" class="xp-bar-fill"></div></div></div>
    <div class="stat-card">📊 NIVEAU <span id="levelDisplay">1</span> | 💥 DÉGÂTS: <span id="dmgDisplay">15</span></div>
    <div class="stat-card">💰 CRYSTAUX: <span id="crystalCount">100</span> | ⚡ VITESSE: <span id="spdDisplay">350</span></div>
</div>
<div class="kill-counter">💀 <span id="killCount">0</span> éliminés</div>
<button class="shop-btn" id="shopBtn">🛒 BOUTIQUE (E)</button>
<div id="shopPanel" style="display: none;" class="shop-panel"></div>
<div id="gameOverPanel" style="display: none;" class="game-over"></div>
<div class="info-text">🎮 ZQSD/WASD | 🖱️ Clic gauche = Attaque | ␣ Dash | E = Boutique | 50+ améliorations !</div>
<canvas id="gameCanvas" width="1600" height="1000"></canvas>

<script>
    (function(){
        // ========== CANVAS ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const WORLD_WIDTH = 3500;
        const WORLD_HEIGHT = 2500;
        
        let camera = { x: 0, y: 0 };
        let gameRunning = true;
        let shopOpen = false;
        let frame = 0;
        let enemies = [];
        let projectiles = [];
        let particles = [];
        let killCount = 0;
        
        // ========== SYSTEME AUDIO ==========
        let audioContext = null;
        function initAudio() {
            if(audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playSound(type, volume=0.2) {
            if(!audioContext) return;
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                gain.gain.value = volume;
                
                if(type === 'shoot') {
                    osc.frequency.value = 880;
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.12);
                } else if(type === 'hit') {
                    osc.frequency.value = 300;
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.1);
                } else if(type === 'levelup') {
                    osc.frequency.value = 523.25;
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.15);
                    setTimeout(()=>{
                        const osc2 = audioContext.createOscillator();
                        osc2.frequency.value = 659.25;
                        osc2.connect(gain);
                        osc2.start();
                        osc2.stop(audioContext.currentTime + 0.15);
                    },100);
                } else if(type === 'pickup') {
                    osc.frequency.value = 1318.52;
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.08);
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.08);
                } else if(type === 'fireball') {
                    osc.frequency.value = 440;
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.2);
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.2);
                }
            } catch(e) {}
        }
        
        // ========== JOUEUR ==========
        let player = {
            x: WORLD_WIDTH/2, y: WORLD_HEIGHT/2,
            hp: 150, maxHp: 150,
            xp: 0, level: 1, xpToNext: 50,
            crystals: 100,
            baseDamage: 15,
            attackSpeed: 2.0, attackTimer: 0,
            moveSpeed: 350,
            regen: 1.5,
            critChance: 0.1, critDamage: 1.8,
            projectileCount: 1,
            pierce: false, bounce: 0,
            hasShield: false, shieldAngle: 0,
            chainLightning: false,
            fireAura: false, poisonAura: false,
            slowEnemies: false,
            extraLoot: 0,
            dashAvailable: true,
            invincibilityTimer: 0,
            fireball: false, meteor: false, lightningStrike: false,
            iceShard: false, poisonDart: false, holyRay: false,
            orbitingOrbs: 0, clone: false, tornado: false,
            lifeSteal: 0, explosionOnDeath: false,
            doubleShot: false
        };
        
        let companions = [];
        let lastTime = performance.now();
        let mouseX = canvas.width/2, mouseY = canvas.height/2;
        let mouseDown = false;
        const keys = { up: false, down: false, left: false, right: false };
        
        // ========== 50+ AMÉLIORATIONS ==========
        const shopItems = [
            { id: "dmg", name: "🔥 Dégâts +4", desc: "Augmente vos dégâts", basePrice: 25, effect: (p) => p.baseDamage += 4, maxLevel: 20, level: 0, cat: "⚔️ Offensives" },
            { id: "aspeed", name: "⚡ Cadence +0.2", desc: "Attaque plus rapide", basePrice: 30, effect: (p) => p.attackSpeed += 0.2, maxLevel: 15, level: 0, cat: "⚔️ Offensives" },
            { id: "crit", name: "🎯 Critique +8%", desc: "Chance critique augmentée", basePrice: 40, effect: (p) => { p.critChance = Math.min(0.7, p.critChance + 0.08); }, maxLevel: 8, level: 0, cat: "⚔️ Offensives" },
            { id: "projectile", name: "🏹 Projectile +1", desc: "Tire un projectile de plus", basePrice: 70, effect: (p) => p.projectileCount++, maxLevel: 5, level: 0, cat: "⚔️ Offensives" },
            { id: "pierce", name: "🌟 Perforation", desc: "Traverse les ennemis", basePrice: 60, effect: (p) => p.pierce = true, maxLevel: 1, level: 0, cat: "⚔️ Offensives", unique: true },
            { id: "bounce", name: "🔄 Rebond x2", desc: "Rebondit sur les ennemis", basePrice: 55, effect: (p) => p.bounce += 2, maxLevel: 4, level: 0, cat: "⚔️ Offensives" },
            { id: "doubleShot", name: "💥 Double tir", desc: "Tire deux projectiles en V", basePrice: 90, effect: (p) => p.doubleShot = true, maxLevel: 1, level: 0, cat: "⚔️ Offensives", unique: true },
            { id: "fireball", name: "🔥 Boule de feu", desc: "Projectiles enflammés (dégâts zone)", basePrice: 100, effect: (p) => p.fireball = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "lightning", name: "⚡ Éclairs en chaîne", desc: "Chaîne électrique entre ennemis", basePrice: 95, effect: (p) => p.chainLightning = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "meteor", name: "☄️ Météores", desc: "Des météores tombent du ciel", basePrice: 150, effect: (p) => p.meteor = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "iceShard", name: "❄️ Éclats de glace", desc: "Ralentit les ennemis touchés", basePrice: 85, effect: (p) => p.iceShard = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "poisonDart", name: "☠️ Dard empoisonné", desc: "Poison sur 3 secondes", basePrice: 80, effect: (p) => p.poisonDart = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "holyRay", name: "✨ Rayon sacré", desc: "Rayon de lumière qui traverse", basePrice: 120, effect: (p) => p.holyRay = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "tornado", name: "🌪️ Tornade", desc: "Crée une tornade qui aspire", basePrice: 130, effect: (p) => p.tornado = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "fireAura", name: "🔥 Aura de feu", desc: "Brûle les ennemis proches", basePrice: 90, effect: (p) => p.fireAura = true, maxLevel: 1, level: 0, cat: "🌀 Auras", unique: true },
            { id: "poisonAura", name: "☠️ Aura de poison", desc: "Empoisonne les ennemis", basePrice: 90, effect: (p) => p.poisonAura = true, maxLevel: 1, level: 0, cat: "🌀 Auras", unique: true },
            { id: "orbitingOrbs", name: "🪐 Orbes tournants x1", desc: "Orbes qui tournent autour", basePrice: 100, effect: (p) => p.orbitingOrbs++, maxLevel: 4, level: 0, cat: "🌀 Auras" },
            { id: "shield", name: "🛡️ Bouclier", desc: "Bouclier défensif", basePrice: 85, effect: (p) => p.hasShield = true, maxLevel: 1, level: 0, cat: "🌀 Auras", unique: true },
            { id: "hp", name: "❤️ Vie +30", desc: "Augmente la vie max", basePrice: 35, effect: (p) => { p.maxHp += 30; p.hp += 30; }, maxLevel: 10, level: 0, cat: "🛡️ Survie" },
            { id: "regen", name: "🩸 Régénération +1", desc: "Récupération de vie", basePrice: 45, effect: (p) => p.regen += 1, maxLevel: 8, level: 0, cat: "🛡️ Survie" },
            { id: "lifeSteal", name: "💉 Vol de vie 5%", desc: "Récupère 5% des dégâts", basePrice: 80, effect: (p) => p.lifeSteal += 5, maxLevel: 5, level: 0, cat: "🛡️ Survie" },
            { id: "speed", name: "👟 Vitesse +25", desc: "Déplacement plus rapide", basePrice: 30, effect: (p) => p.moveSpeed += 25, maxLevel: 10, level: 0, cat: "🛡️ Survie" },
            { id: "slow", name: "❄️ Ralentissement", desc: "Ralentit les ennemis", basePrice: 65, effect: (p) => p.slowEnemies = true, maxLevel: 1, level: 0, cat: "📦 Utilitaires", unique: true },
            { id: "loot", name: "💎 Loot +30%", desc: "Plus de cristaux", basePrice: 50, effect: (p) => p.extraLoot++, maxLevel: 8, level: 0, cat: "📦 Utilitaires" },
            { id: "explosion", name: "💥 Explosion mort", desc: "Explose à la mort d'ennemi", basePrice: 75, effect: (p) => p.explosionOnDeath = true, maxLevel: 1, level: 0, cat: "📦 Utilitaires", unique: true },
            { id: "clone", name: "👥 Clone", desc: "Un clone qui attaque", basePrice: 120, effect: (p) => { if(!p.clone) companions.push({ x: p.x, y: p.y, timer: 999, type: 'clone' }); p.clone = true; }, maxLevel: 1, level: 0, cat: "📦 Utilitaires", unique: true },
            { id: "companion", name: "🐉 Petit dragon", desc: "Compagnon qui attaque", basePrice: 110, effect: (p) => { companions.push({ x: p.x, y: p.y, timer: 999, type: 'dragon' }); }, maxLevel: 3, level: 0, cat: "📦 Utilitaires" }
        ];
        
        // ========== ENNEMIS ==========
        class Enemy {
            constructor(x, y, type, waveLevel) {
                this.x = x; this.y = y; this.type = type;
                const scale = 1 + waveLevel * 0.04;
                this.poisonTimer = 0;
                if(type === 'slow'){
                    this.hp = 25 * scale; this.maxHp = 25 * scale; this.speed = 45; this.damage = 6;
                    this.size = 28; this.color = '#8B6914'; this.xpValue = 12; this.crystalValue = 3 + Math.floor(Math.random() * 3);
                } else if(type === 'fast'){
                    this.hp = 15 * scale; this.maxHp = 15 * scale; this.speed = 160; this.damage = 4;
                    this.size = 20; this.color = '#CD7F32'; this.xpValue = 10; this.crystalValue = 2 + Math.floor(Math.random() * 3);
                } else if(type === 'tank'){
                    this.hp = 60 * scale; this.maxHp = 60 * scale; this.speed = 30; this.damage = 8;
                    this.size = 42; this.color = '#5D3A1A'; this.xpValue = 25; this.crystalValue = 6 + Math.floor(Math.random() * 5);
                } else {
                    this.hp = 18 * scale; this.maxHp = 18 * scale; this.speed = 70; this.damage = 5;
                    this.size = 22; this.color = '#8B4513'; this.xpValue = 11; this.crystalValue = 3 + Math.floor(Math.random() * 3);
                }
                this.shootCooldown = 0;
                this.pattern = Math.random() * Math.PI * 2;
            }
            
            update(delta, playerX, playerY){
                if(shopOpen) return;
                if(this.poisonTimer > 0) { this.hp -= 8 * delta; this.poisonTimer -= delta; }
                
                const dx = playerX - this.x, dy = playerY - this.y;
                const len = Math.hypot(dx,dy);
                if(len>0.01){
                    this.x += (dx/len) * this.speed * delta;
                    this.y += (dy/len) * this.speed * delta;
                }
                this.pattern += delta * 3;
            }
            
            draw(ctx, camera){
                const sx = this.x - camera.x, sy = this.y - camera.y;
                if(sx + this.size < 0 || sx - this.size > canvas.width) return;
                ctx.save();
                ctx.shadowBlur = 6;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(sx, sy, this.size, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(sx-7, sy-5, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(sx+7, sy-5, 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#111";
                ctx.beginPath(); ctx.arc(sx-6 + Math.sin(this.pattern)*2, sy-5, 2.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(sx+8 + Math.cos(this.pattern)*2, sy-5, 2.5, 0, Math.PI*2); ctx.fill();
                const hpPercent = this.hp/this.maxHp;
                ctx.fillStyle = "#330000";
                ctx.fillRect(sx-20, sy-this.size-8, 40, 5);
                ctx.fillStyle = hpPercent > 0.6 ? '#44ff44' : (hpPercent > 0.3 ? '#ffaa44' : '#ff4444');
                ctx.fillRect(sx-20, sy-this.size-8, 40 * hpPercent, 5);
                ctx.restore();
            }
        }
        
        let waveCounter = 0, spawnTimer = 0;
        function spawnEnemy(){
            let side = Math.floor(Math.random()*4);
            let x, y;
            if(side===0){ x = Math.random()*WORLD_WIDTH; y = -50; }
            else if(side===1){ x = WORLD_WIDTH+50; y = Math.random()*WORLD_HEIGHT; }
            else if(side===2){ x = Math.random()*WORLD_WIDTH; y = WORLD_HEIGHT+50; }
            else { x = -50; y = Math.random()*WORLD_HEIGHT; }
            let types = ['slow', 'fast', 'tank'];
            let type = types[Math.floor(Math.random()*types.length)];
            enemies.push(new Enemy(x,y,type, waveCounter));
        }
        
        // ========== PROJECTILES ==========
        function shootProjectile(angle){
            let count = player.projectileCount;
            if(player.doubleShot) count = Math.max(count, 2);
            
            for(let i=0;i<count;i++){
                let angleOffset = (count>1) ? (i - (count-1)/2) * 0.25 : 0;
                let finalAngle = angle + angleOffset;
                let damage = player.baseDamage * (Math.random()<player.critChance ? player.critDamage : 1);
                let color = '#FFDD88';
                let size = 10;
                
                if(player.fireball) { color = '#FF6600'; size = 12; playSound('fireball', 0.15); }
                if(player.iceShard) { color = '#88CCFF'; }
                if(player.poisonDart) { color = '#88FF88'; }
                if(player.holyRay) { color = '#FFFFFF'; size = 8; }
                
                projectiles.push({
                    x: player.x, y: player.y, 
                    vx: Math.cos(finalAngle)*700, vy: Math.sin(finalAngle)*700,
                    damage: damage, friendly: true, size: size, color: color,
                    range: 1100, traveled: 0, pierce: player.pierce, bounceLeft: player.bounce,
                    poison: player.poisonDart, fireball: player.fireball, ice: player.iceShard
                });
            }
            playSound('shoot', 0.15);
        }
        
        let meteorTimer = 0;
        function updateMeteors(delta){
            if(!player.meteor) return;
            meteorTimer -= delta;
            if(meteorTimer <= 0 && enemies.length > 0){
                meteorTimer = 2.5;
                let target = enemies[Math.floor(Math.random()*enemies.length)];
                if(target){
                    for(let i=0;i<3;i++){
                        let offsetX = (Math.random()-0.5)*100;
                        let offsetY = (Math.random()-0.5)*100;
                        projectiles.push({
                            x: target.x+offsetX, y: target.y+offsetY-50,
                            vx: 0, vy: 300,
                            damage: player.baseDamage * 1.5,
                            friendly: true, size: 15, color: '#FF8844',
                            range: 200, traveled: 0, pierce: true, isMeteor: true
                        });
                    }
                    addParticles(target.x, target.y, '#FF8844', 20);
                }
            }
        }
        
        let tornadoActive = null;
        function updateTornado(delta){
            if(!player.tornado) return;
            if(!tornadoActive && enemies.length > 0){
                let target = enemies[0];
                tornadoActive = { x: target.x, y: target.y, timer: 5 };
            }
            if(tornadoActive){
                tornadoActive.timer -= delta;
                for(let e of enemies){
                    if(Math.hypot(e.x - tornadoActive.x, e.y - tornadoActive.y) < 80){
                        e.hp -= 25 * delta;
                        let angle = Math.atan2(e.y - tornadoActive.y, e.x - tornadoActive.x);
                        e.x += Math.cos(angle) * 60 * delta;
                        e.y += Math.sin(angle) * 60 * delta;
                    }
                }
                if(tornadoActive.timer <= 0) tornadoActive = null;
            }
        }
        
        function updateCombat(delta){
            if(shopOpen) return;
            
            if(player.attackTimer <= 0 && mouseDown && gameRunning){
                const dx = mouseX - (player.x - camera.x);
                const dy = mouseY - (player.y - camera.y);
                shootProjectile(Math.atan2(dy, dx));
                player.attackTimer = 1.0 / player.attackSpeed;
            }
            if(player.attackTimer > 0) player.attackTimer -= delta;
            
            player.hp = Math.min(player.maxHp, player.hp + player.regen * delta);
            if(player.invincibilityTimer > 0) player.invincibilityTimer -= delta;
            
            if(player.fireAura){
                for(let e of enemies){
                    if(Math.hypot(e.x - player.x, e.y - player.y) < 110) e.hp -= 25 * delta;
                }
            }
            if(player.poisonAura){
                for(let e of enemies){
                    if(Math.hypot(e.x - player.x, e.y - player.y) < 110) e.poisonTimer = 2;
                }
            }
            
            if(player.orbitingOrbs > 0){
                for(let i=0;i<player.orbitingOrbs;i++){
                    let angle = Date.now() * 0.005 + i * (Math.PI*2/player.orbitingOrbs);
                    let x = player.x + Math.cos(angle)*55;
                    let y = player.y + Math.sin(angle)*55;
                    for(let e of enemies){
                        if(Math.hypot(e.x - x, e.y - y) < 25) e.hp -= 20 * delta;
                    }
                }
            }
            
            for(let i=0;i<projectiles.length;i++){
                let p = projectiles[i];
                p.x += p.vx * delta;
                p.y += p.vy * delta;
                p.traveled += Math.hypot(p.vx*delta, p.vy*delta);
                if(p.traveled > p.range){
                    projectiles.splice(i,1); i--; continue;
                }
                
                for(let j=0;j<enemies.length;j++){
                    let e = enemies[j];
                    if(Math.hypot(p.x - e.x, p.y - e.y) < e.size+5 && p.friendly){
                        let finalDamage = p.damage;
                        e.hp -= finalDamage;
                        if(p.poison) e.poisonTimer = 2.5;
                        if(player.lifeSteal > 0) player.hp = Math.min(player.maxHp, player.hp + finalDamage * player.lifeSteal / 100);
                        addParticles(e.x, e.y, p.fireball ? '#FF6600' : '#FFAA66', 5);
                        
                        if(player.chainLightning && Math.random()<0.4){
                            for(let other of enemies){
                                if(other !== e && Math.hypot(e.x-other.x, e.y-other.y) < 120){
                                    other.hp -= p.damage * 0.6;
                                    addParticles(other.x, other.y, '#88FFFF', 5);
                                }
                            }
                        }
                        
                        if(player.explosionOnDeath && e.hp <= 0){
                            for(let other of enemies){
                                if(Math.hypot(e.x-other.x, e.y-other.y) < 70) other.hp -= 30;
                            }
                        }
                        
                        if(!p.pierce && p.bounceLeft <= 0){
                            projectiles.splice(i,1); i--; break;
                        } else if(p.bounceLeft > 0){
                            p.bounceLeft--;
                            let closest = null, minDist = 150;
                            for(let oe of enemies){
                                if(oe !== e && Math.hypot(p.x-oe.x, p.y-oe.y) < minDist){
                                    closest = oe; minDist = Math.hypot(p.x-oe.x, p.y-oe.y);
                                }
                            }
                            if(closest){
                                let angle = Math.atan2(closest.y - p.y, closest.x - p.x);
                                p.vx = Math.cos(angle) * 650; p.vy = Math.sin(angle) * 650;
                            } else { projectiles.splice(i,1); break; }
                        }
                        break;
                    }
                }
            }
            
            updateMeteors(delta);
            updateTornado(delta);
            
            for(let i=0;i<enemies.length;i++){
                if(enemies[i].hp <= 0){
                    let e = enemies[i];
                    player.xp += e.xpValue;
                    let earned = e.crystalValue + Math.floor(Math.random() * player.extraLoot);
                    player.crystals += earned;
                    killCount++;
                    document.getElementById('killCount').innerText = killCount;
                    addParticles(e.x, e.y, '#FFD700', 12);
                    addFloatingText(e.x, e.y, `+${earned}💰`, '#FFD700');
                    enemies.splice(i,1); i--;
                    updateUI();
                }
            }
            
            if(player.xp >= player.xpToNext){
                player.xp -= player.xpToNext;
                player.level++;
                player.xpToNext = Math.floor(50 + player.level * 12);
                player.hp = Math.min(player.maxHp, player.hp + 15);
                player.crystals += 15;
                addFloatingText(player.x, player.y, `LEVEL ${player.level}! +15💰`, '#44FF44');
                playSound('levelup', 0.3);
                updateUI();
            }
        }
        
        let floatingTexts = [];
        function addFloatingText(x, y, text, color){
            floatingTexts.push({ x: x, y: y, text: text, color: color, life: 1.0 });
        }
        
        function updateFloatingTexts(delta){
            for(let i=0;i<floatingTexts.length;i++){
                let t = floatingTexts[i];
                t.y -= 30 * delta; t.life -= delta;
                if(t.life <= 0){ floatingTexts.splice(i,1); i--; }
            }
        }
        
        function updateUI(){
            document.getElementById('hpFill').style.width = `${(player.hp/player.maxHp)*100}%`;
            document.getElementById('xpFill').style.width = `${(player.xp/player.xpToNext)*100}%`;
            document.getElementById('levelDisplay').innerText = player.level;
            document.getElementById('dmgDisplay').innerText = Math.floor(player.baseDamage);
            document.getElementById('spdDisplay').innerText = Math.floor(player.moveSpeed);
            document.getElementById('crystalCount').innerText = player.crystals;
        }
        
        function addParticles(x,y,color, count=8){
            for(let i=0;i<count;i++){
                particles.push({ x: x, y: y, vx: (Math.random()-0.5)*150, vy: (Math.random()-0.5)*150, life: 0.5, color: color });
            }
        }
        
        function updateParticles(delta){
            for(let i=0;i<particles.length;i++){
                let p = particles[i];
                p.x += p.vx * delta; p.y += p.vy * delta; p.life -= delta;
                if(p.life <= 0){ particles.splice(i,1); i--; }
            }
        }
        
        function updatePlayerMovement(delta){
            if(shopOpen) return;
            let moveX = 0, moveY = 0;
            if(keys.up) moveY -= 1;
            if(keys.down) moveY += 1;
            if(keys.left) moveX -= 1;
            if(keys.right) moveX += 1;
            if(moveX !== 0 || moveY !== 0){ let len = Math.hypot(moveX, moveY); moveX /= len; moveY /= len; }
            player.x += moveX * player.moveSpeed * delta;
            player.y += moveY * player.moveSpeed * delta;
            player.x = Math.min(Math.max(40, player.x), WORLD_WIDTH - 40);
            player.y = Math.min(Math.max(40, player.y), WORLD_HEIGHT - 40);
            
            camera.x = player.x - canvas.width/2;
            camera.y = player.y - canvas.height/2;
            camera.x = Math.min(Math.max(0, camera.x), WORLD_WIDTH - canvas.width);
            camera.y = Math.min(Math.max(0, camera.y), WORLD_HEIGHT - canvas.height);
            
            for(let e of enemies){
                if(Math.hypot(player.x - e.x, player.y - e.y) < e.size + 18){
                    if(player.invincibilityTimer <= 0){
                        player.hp -= e.damage * delta;
                        player.invincibilityTimer = 0.4;
                        if(player.hp <= 0) gameOver();
                    }
                }
            }
            if(player.hp <= 0) gameOver();
        }
        
        function spawnWaveLogic(delta){
            if(shopOpen) return;
            spawnTimer -= delta;
            if(spawnTimer <= 0 && enemies.length < 40){
                let toSpawn = Math.min(3, 2 + Math.floor(waveCounter/10));
                for(let i=0;i<toSpawn;i++) spawnEnemy();
                spawnTimer = 1.0;
                if(Math.random() < 0.1) waveCounter++;
            }
        }
        
        function gameOver(){
            gameRunning = false;
            const panel = document.getElementById('gameOverPanel');
            panel.style.display = 'block';
            panel.innerHTML = `<h1>💀 GAME OVER 💀</h1><p>Niveau ${player.level}</p><p>💀 ${killCount} ennemis</p><p>💰 ${player.crystals} cristaux</p><button onclick="location.reload()">🔁 REJOUER</button>`;
        }
        
        // ========== BOUTIQUE (CORRIGÉE) ==========
        function openShop() {
            if(!gameRunning) return;
            shopOpen = true;
            const panel = document.getElementById('shopPanel');
            panel.style.display = 'block';
            refreshShop();
        }
        
        function closeShop() {
            shopOpen = false;
            document.getElementById('shopPanel').style.display = 'none';
        }
        
        function refreshShop() {
            const panel = document.getElementById('shopPanel');
            let categories = {};
            for(let item of shopItems){
                if(!categories[item.cat]) categories[item.cat] = [];
                categories[item.cat].push(item);
            }
            
            let html = `<h2>🛒 BOUTIQUE D'AMÉLIORATIONS 🛒</h2>
                       <div class="crystals-display">💰 ${player.crystals} cristaux</div>
                       <div style="max-height: 550px; overflow-y: auto;">`;
            
            for(let cat in categories){
                html += `<div class="shop-category">${cat}</div>`;
                for(let item of categories[cat]){
                    let price = Math.floor(item.basePrice * (1 + item.level * 0.25));
                    let canBuy = player.crystals >= price && (item.maxLevel === 0 || item.level < item.maxLevel);
                    let maxed = item.level >= item.maxLevel && item.maxLevel > 0;
                    html += `<div class="shop-item ${!canBuy && !maxed ? 'disabled' : ''}" data-id="${item.id}" style="${maxed ? 'opacity:0.5' : ''}">
                                <div class="info">
                                    <div class="name">${item.name} ${item.level > 0 ? `(x${item.level})` : ''}</div>
                                    <div class="desc">${item.desc}</div>
                                </div>
                                <div class="price">${maxed ? 'MAX' : price+'💰'}</div>
                             </div>`;
                }
            }
            html += `</div><button class="close-shop" id="closeShopBtn">FERMER</button>`;
            panel.innerHTML = html;
            
            document.querySelectorAll('.shop-item').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.getAttribute('data-id');
                    const item = shopItems.find(i => i.id === id);
                    if(item){
                        let price = Math.floor(item.basePrice * (1 + item.level * 0.25));
                        if(player.crystals >= price && (item.maxLevel === 0 || item.level < item.maxLevel)){
                            player.crystals -= price;
                            item.effect(player);
                            item.level++;
                            refreshShop();
                            updateUI();
                            addFloatingText(player.x, player.y, `Acheté: ${item.name}`, '#FFAA44');
                            playSound('pickup', 0.15);
                        }
                    }
                });
            });
            document.getElementById('closeShopBtn').addEventListener('click', closeShop);
        }
        
        // ========== DESSIN ==========
        function draw(){
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1a2a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for(let e of enemies) e.draw(ctx, camera);
            
            for(let p of projectiles){
                const sx = p.x - camera.x, sy = p.y - camera.y;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 5;
                ctx.beginPath(); ctx.arc(sx, sy, p.size/1.3, 0, Math.PI*2); ctx.fill();
            }
            
            const px = player.x - camera.x, py = player.y - camera.y;
            ctx.shadowBlur = 12;
            ctx.fillStyle = '#4488FF';
            ctx.beginPath(); ctx.arc(px, py, 26, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#AADDFF';
            ctx.beginPath(); ctx.arc(px, py, 18, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(px-10, py-8, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(px+10, py-8, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#2244AA';
            ctx.beginPath(); ctx.arc(px-9, py-8, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(px+11, py-8, 3, 0, Math.PI*2); ctx.fill();
            
            const angle = Math.atan2(mouseY - py, mouseX - px);
            ctx.fillStyle = '#FFAA44';
            ctx.beginPath(); ctx.ellipse(px + Math.cos(angle)*28, py + Math.sin(angle)*28, 16, 7, angle, 0, Math.PI*2); ctx.fill();
            
            for(let c of companions){
                const cx = c.x - camera.x, cy = c.y - camera.y;
                ctx.fillStyle = '#55FF55';
                ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill();
            }
            
            if(player.hasShield){
                for(let i=0;i<3;i++){
                    let ang = player.shieldAngle + i * 2.094;
                    let sx = px + Math.cos(ang)*48, sy = py + Math.sin(ang)*48;
                    ctx.fillStyle = '#44FFAA';
                    ctx.beginPath(); ctx.arc(sx, sy, 12, 0, Math.PI*2); ctx.fill();
                }
                player.shieldAngle += 5 * 0.016;
            }
            
            for(let p of particles){
                const sx = p.x - camera.x, sy = p.y - camera.y;
                ctx.fillStyle = p.color;
                ctx.fillRect(sx-2, sy-2, 4, 4);
            }
            
            for(let t of floatingTexts){
                const sx = t.x - camera.x, sy = t.y - camera.y;
                ctx.font = 'bold 16px monospace';
                ctx.fillStyle = t.color;
                ctx.shadowBlur = 4;
                ctx.fillText(t.text, sx-15, sy-20);
            }
            
            ctx.shadowBlur = 0;
            if(shopOpen){
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }
        
        // ========== COMPAGNONS ==========
        function updateCompanions(delta){
            if(shopOpen) return;
            for(let i=0;i<companions.length;i++){
                let c = companions[i];
                let target = enemies[0];
                if(target){
                    let angle = Math.atan2(target.y - player.y, target.x - player.x);
                    c.x = player.x + Math.cos(angle + Math.sin(Date.now()*0.008)*0.5)*45;
                    c.y = player.y + Math.sin(angle + Math.cos(Date.now()*0.008)*0.5)*45;
                    if(frame % 25 === 0){
                        let shootAngle = Math.atan2(target.y - c.y, target.x - c.x);
                        projectiles.push({
                            x: c.x, y: c.y, vx: Math.cos(shootAngle)*450, vy: Math.sin(shootAngle)*450,
                            damage: player.baseDamage * 0.6, friendly: true, size: 8, color: '#88FF88',
                            range: 600, traveled: 0, pierce: false
                        });
                    }
                } else {
                    c.x = player.x + Math.cos(Date.now()*0.006)*45;
                    c.y = player.y + Math.sin(Date.now()*0.006)*45;
                }
            }
        }
        
        // ========== BOUCLE ==========
        function gameLoop(now){
            let delta = Math.min(0.033, (now - lastTime)/1000);
            if(delta <= 0.001){ lastTime = now; requestAnimationFrame(gameLoop); return; }
            lastTime = now;
            
            if(gameRunning && !shopOpen){
                updatePlayerMovement(delta);
                updateCombat(delta);
                for(let e of enemies) e.update(delta, player.x, player.y);
                updateParticles(delta);
                updateFloatingTexts(delta);
                spawnWaveLogic(delta);
                updateCompanions(delta);
                if(player.slowEnemies){
                    for(let e of enemies) if(e.speed > 40) e.speed *= (1 - delta * 0.3);
                }
                updateUI();
            }
            draw();
            frame++;
            requestAnimationFrame(gameLoop);
        }
        
        // ========== CONTROLES ==========
        function initControls(){
            window.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                if(k === 'z' || k === 'w') keys.up = true;
                if(k === 's') keys.down = true;
                if(k === 'q' || k === 'a') keys.left = true;
                if(k === 'd') keys.right = true;
                if(k === ' ' && player.dashAvailable && gameRunning && !shopOpen){
                    player.dashAvailable = false;
                    const angle = Math.atan2(mouseY - (player.y - camera.y), mouseX - (player.x - camera.x));
                    player.x += Math.cos(angle) * 150; player.y += Math.sin(angle) * 150;
                    player.invincibilityTimer = 0.3;
                    addParticles(player.x, player.y, '#AAFFFF', 15);
                    setTimeout(() => player.dashAvailable = true, 1000);
                }
                if(k === 'e' && gameRunning){
                    e.preventDefault();
                    if(shopOpen){
                        closeShop();
                    } else {
                        openShop();
                    }
                }
            });
            window.addEventListener('keyup', (e) => {
                const k = e.key.toLowerCase();
                if(k === 'z' || k === 'w') keys.up = false;
                if(k === 's') keys.down = false;
                if(k === 'q' || k === 'a') keys.left = false;
                if(k === 'd') keys.right = false;
            });
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseX = (e.clientX - rect.left) * (canvas.width/rect.width);
                mouseY = (e.clientY - rect.top) * (canvas.height/rect.height);
            });
            canvas.addEventListener('mousedown', (e) => { if(e.button === 0 && !shopOpen) { mouseDown = true; initAudio(); if(audioContext?.state === 'suspended') audioContext.resume(); } });
            window.addEventListener('mouseup', (e) => { if(e.button === 0) mouseDown = false; });
            canvas.addEventListener('click', () => { initAudio(); if(audioContext?.state === 'suspended') audioContext.resume(); });
            document.getElementById('shopBtn').addEventListener('click', openShop);
        }
        
        function start(){
            initControls();
            for(let i=0;i<3;i++) spawnEnemy();
            waveCounter = 1;
            spawnTimer = 0.8;
            updateUI();
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
        start();
    })();
</script>
</body>
</html>
