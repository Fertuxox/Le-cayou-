<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FERTUXOX — ULTIMATE ARCADE | SONS + UPGRADES</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #0a0000 0%, #000000 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
      padding: 20px;
    }

    .game-wrapper {
      background: #000000aa;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 0 50px rgba(255,0,34,0.3);
      border: 1px solid #ff0022;
    }

    canvas {
      display: block;
      margin: 0 auto;
      box-shadow: 0 0 30px #ff0022;
      border-radius: 8px;
      cursor: none;
    }

    .game-panel {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      background: #0a0000cc;
      padding: 12px 20px;
      border-radius: 16px;
      border: 1px solid #ff002260;
    }

    .stats {
      display: flex;
      gap: 25px;
    }

    .stat-box {
      background: #000000aa;
      padding: 4px 12px;
      border-radius: 8px;
      border-left: 3px solid #ff0022;
    }

    .stat-label {
      font-size: 10px;
      color: #ff8888;
      letter-spacing: 2px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: bold;
      color: #ff0022;
      text-shadow: 0 0 5px #ff0022;
    }

    .currency-panel {
      background: #1a0005;
      padding: 5px 18px;
      border-radius: 40px;
      border: 1px solid #ffaa00;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .currency-amount {
      font-size: 22px;
      font-weight: bold;
      color: #ffaa44;
    }

    button {
      background: #ff0022;
      border: none;
      color: white;
      font-family: monospace;
      font-weight: bold;
      padding: 7px 18px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 12px #ff0022;
    }

    .escape-menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.96);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }

    .escape-menu.active {
      visibility: visible;
      opacity: 1;
    }

    .menu-container {
      background: #0a0000;
      border: 2px solid #ff0022;
      border-radius: 24px;
      width: 90%;
      max-width: 850px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 20px;
      box-shadow: 0 0 60px #ff002260;
    }

    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ff0022;
      padding-bottom: 15px;
      margin-bottom: 20px;
    }

    .menu-title {
      font-size: 26px;
      color: #ff0022;
      font-family: monospace;
      letter-spacing: 3px;
    }

    .close-menu {
      background: #330000;
      padding: 8px 20px;
    }

    .upgrade-grid-menu {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .upgrade-card-menu {
      background: #111111;
      border: 1px solid #ff002280;
      border-radius: 16px;
      padding: 12px;
      transition: 0.2s;
    }

    .upgrade-card-menu:hover {
      border-color: #ff0022;
      background: #1a0005;
    }

    .upgrade-name-menu {
      font-weight: bold;
      font-size: 14px;
      color: #ff8888;
    }

    .upgrade-level-menu {
      font-size: 11px;
      color: #ffaa44;
      margin: 5px 0;
    }

    .upgrade-desc-menu {
      font-size: 10px;
      color: #aaa;
      margin: 8px 0;
    }

    .upgrade-cost-menu {
      color: #ffaa44;
      font-weight: bold;
      margin: 8px 0;
    }

    .upgrade-btn-menu {
      background: #ff0022;
      width: 100%;
      padding: 6px;
      border-radius: 20px;
      font-size: 12px;
    }

    .upgrade-btn-menu.disabled {
      background: #330000;
      opacity: 0.6;
      cursor: not-allowed;
    }

    .menu-stats {
      background: #000000aa;
      padding: 15px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .resume-btn {
      background: #ff0022;
      font-size: 16px;
      padding: 10px 30px;
      margin-top: 15px;
      width: 100%;
    }

    .volume-badge {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #000000aa;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      color: #ffaa44;
      font-family: monospace;
      z-index: 100;
      pointer-events: none;
    }

    .controls-hint {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
<div>
  <div class="game-wrapper">
    <canvas id="gameCanvas" width="900" height="550"></canvas>
    
    <div class="game-panel">
      <div class="stats">
        <div class="stat-box"><div class="stat-label">SCORE</div><div class="stat-value" id="scoreDisplay">0</div></div>
        <div class="stat-box"><div class="stat-label">BEST</div><div class="stat-value" id="hiScoreDisplay">0</div></div>
        <div class="stat-box"><div class="stat-label">❤️</div><div class="stat-value" id="hpDisplay">3</div></div>
        <div class="stat-box"><div class="stat-label">🔥 DIFF</div><div class="stat-value" id="diffDisplay">1.0x</div></div>
      </div>
      <div class="currency-panel">
        <span>💎</span>
        <span class="currency-amount" id="crystalDisplay">0</span>
      </div>
      <button id="restartButton">⟳ RESTART</button>
    </div>
    <div class="controls-hint">
      🎮 ZQSD / Flèches | ESPACE TIR | [ECHAP] → MENU UPGRADES | 🔊 Sons intégrés
    </div>
  </div>
</div>

<div class="volume-badge">🔊 AUDIO ACTIF</div>

<div id="escapeMenu" class="escape-menu">
  <div class="menu-container">
    <div class="menu-header">
      <span class="menu-title">⚡ LABO D'AMÉLIORATIONS ⚡</span>
      <button class="close-menu" id="closeMenuBtn">FERMER [ESC]</button>
    </div>
    <div class="upgrade-grid-menu" id="menuUpgradeGrid"></div>
    <div class="menu-stats">
      <div>💎 <strong id="menuCrystals">0</strong></div>
      <div>⚡ VIT: <strong id="statSpeed">0</strong></div>
      <div>🔫 CAD: <strong id="statRate">0</strong></div>
      <div>💥 MULTI: <strong id="statMulti">0</strong></div>
      <div>🛡️ PV: <strong id="statShield">0</strong></div>
      <div>💀 DÉGÂTS: <strong id="statDmg">0</strong></div>
      <div>❤️ RÉGÉN: <strong id="statRegen">0</strong></div>
      <div>💰 BONUS: <strong id="statCrystalBonus">0</strong></div>
    </div>
    <button class="resume-btn" id="resumeGameBtn">▶ REPRENDRE LE JEU</button>
  </div>
</div>

<script>
  // ======================== GÉNÉRATEUR DE SONS (Web Audio API) ========================
  class SoundFX {
    constructor() {
      this.audioCtx = null;
      this.enabled = true;
      this.initAudio();
    }
    initAudio() {
      try {
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) { this.enabled = false; }
    }
    playShoot() {
      if(!this.enabled || !this.audioCtx) return;
      const osc = this.audioCtx.createOscillator();
      const gain = this.audioCtx.createGain();
      osc.connect(gain);
      gain.connect(this.audioCtx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.15;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, this.audioCtx.currentTime + 0.25);
      osc.stop(this.audioCtx.currentTime + 0.25);
    }
    playExplosion(x) {
      if(!this.enabled || !this.audioCtx) return;
      const osc = this.audioCtx.createOscillator();
      const gain = this.audioCtx.createGain();
      osc.connect(gain);
      gain.connect(this.audioCtx.destination);
      osc.frequency.value = 150;
      gain.gain.value = 0.2;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, this.audioCtx.currentTime + 0.3);
      osc.frequency.exponentialRampToValueAtTime(60, this.audioCtx.currentTime + 0.3);
      osc.stop(this.audioCtx.currentTime + 0.3);
    }
    playHit() {
      if(!this.enabled || !this.audioCtx) return;
      const osc = this.audioCtx.createOscillator();
      const gain = this.audioCtx.createGain();
      osc.connect(gain);
      gain.connect(this.audioCtx.destination);
      osc.frequency.value = 320;
      gain.gain.value = 0.12;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, this.audioCtx.currentTime + 0.2);
      osc.stop(this.audioCtx.currentTime + 0.2);
    }
    playUpgrade() {
      if(!this.enabled || !this.audioCtx) return;
      const osc = this.audioCtx.createOscillator();
      const gain = this.audioCtx.createGain();
      osc.connect(gain);
      gain.connect(this.audioCtx.destination);
      osc.frequency.value = 523.25;
      gain.gain.value = 0.18;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, this.audioCtx.currentTime + 0.4);
      osc.frequency.exponentialRampToValueAtTime(880, this.audioCtx.currentTime + 0.4);
      osc.stop(this.audioCtx.currentTime + 0.4);
    }
    playCollect() {
      if(!this.enabled || !this.audioCtx) return;
      const osc = this.audioCtx.createOscillator();
      const gain = this.audioCtx.createGain();
      osc.connect(gain);
      gain.connect(this.audioCtx.destination);
      osc.frequency.value = 1046.5;
      gain.gain.value = 0.1;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, this.audioCtx.currentTime + 0.2);
      osc.stop(this.audioCtx.currentTime + 0.2);
    }
    playDamage() {
      if(!this.enabled || !this.audioCtx) return;
      const osc = this.audioCtx.createOscillator();
      const gain = this.audioCtx.createGain();
      osc.connect(gain);
      gain.connect(this.audioCtx.destination);
      osc.frequency.value = 180;
      gain.gain.value = 0.2;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, this.audioCtx.currentTime + 0.25);
      osc.frequency.exponentialRampToValueAtTime(80, this.audioCtx.currentTime + 0.25);
      osc.stop(this.audioCtx.currentTime + 0.25);
    }
    resumeAudio() { if(this.audioCtx && this.audioCtx.state === 'suspended') this.audioCtx.resume(); }
  }
  
  const sound = new SoundFX();
  // Déverrouillage audio au premier clic/touche
  function unlockAudio() { sound.resumeAudio(); document.removeEventListener('click', unlockAudio); document.removeEventListener('keydown', unlockAudio); }
  document.addEventListener('click', unlockAudio);
  document.addEventListener('keydown', unlockAudio);
  
  // ======================== CANVAS & JEU ========================
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = 900, H = 550;
  
  let gameState = 'start';
  let score = 0;
  let highScore = localStorage.getItem('fx_high_v4') ? parseInt(localStorage.getItem('fx_high_v4')) : 0;
  let frame = 0;
  let difficulty = 1.0;
  
  let player = {
    x: W/2, y: H-70, w:32, h:36,
    hp: 3, maxHp: 3,
    speed: 3.5,
    fireDelay: 200,
    multiShot: 0,
    damageBonus: 0,
    crystalBonus: 0,
    regen: 0,
    invincible: 0,
    regenCounter: 0,
    critChance: 0,
    pierce: 0,
    magnetRange: 0,
    explosion: 0
  };
  
  let bullets = [], enemies = [], pickups = [], particles = [], stars = [];
  let keys = { ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false, KeyW:false, KeyS:false, KeyA:false, KeyD:false, Space:false };
  let lastShot = 0;
  let crystals = 0;
  
  // ======================== 12 UPGRADES COMPLÈTES ========================
  let upgrades = {
    speed:     { level:0, max:8, baseCost:35, desc:"Vitesse de déplacement", effect:()=> 3.0 + upgrades.speed.level * 0.7, display:"+0.7 v" },
    fireRate:  { level:0, max:8, baseCost:40, desc:"Cadence de tir (-10ms)", effect:()=> Math.max(95, 210 - upgrades.fireRate.level * 12), display:"-12ms" },
    multiShot: { level:0, max:5, baseCost:65, desc:"Tirs supplémentaires", effect:()=> upgrades.multiShot.level, display:"+1 balle" },
    shield:    { level:0, max:5, baseCost:70, desc:"Points de vie max", effect:()=> upgrades.shield.level, display:"+1 PV" },
    damage:    { level:0, max:7, baseCost:55, desc:"Dégâts des tirs", effect:()=> upgrades.damage.level, display:"+1 dmg" },
    regen:     { level:0, max:5, baseCost:60, desc:"Régénération (5s)", effect:()=> upgrades.regen.level, display:"niv regen" },
    crystalBonus:{ level:0, max:6, baseCost:50, desc:"Bonus cristaux", effect:()=> upgrades.crystalBonus.level * 2, display:"+2 💎" },
    critChance:{ level:0, max:6, baseCost:75, desc:"Chance critique (x2)", effect:()=> upgrades.critChance.level * 6, display:"+6% crit" },
    pierce:    { level:0, max:4, baseCost:80, desc:"Tirs traversants", effect:()=> upgrades.pierce.level, display:"+1 pénétration" },
    magnet:    { level:0, max:3, baseCost:90, desc:"Magnétisme", effect:()=> upgrades.magnet.level * 55, display:"rayon +55px" },
    explosion: { level:0, max:4, baseCost:95, desc:"Explosion à mort", effect:()=> upgrades.explosion.level, display:"zone dmg" },
    maxHpRegen:{ level:0, max:4, baseCost:85, desc:"Armure renforcée", effect:()=> upgrades.maxHpRegen.level, display:"+2 PV max" }
  };
  
  function applyUpgrades() {
    player.speed = upgrades.speed.effect();
    player.fireDelay = upgrades.fireRate.effect();
    player.multiShot = upgrades.multiShot.effect();
    player.damageBonus = upgrades.damage.effect();
    player.crystalBonus = upgrades.crystalBonus.effect();
    player.regen = upgrades.regen.level;
    player.critChance = upgrades.critChance.effect();
    player.pierce = upgrades.pierce.effect();
    player.magnetRange = upgrades.magnet.effect();
    player.explosion = upgrades.explosion.level;
    let extraHp = upgrades.maxHpRegen.effect() * 2;
    let newMax = 3 + upgrades.shield.effect() + extraHp;
    if(newMax > player.maxHp) {
      player.maxHp = newMax;
      player.hp = Math.min(player.hp + (newMax - player.maxHp + 2), player.maxHp);
    } else {
      player.maxHp = newMax;
      if(player.hp > player.maxHp) player.hp = player.maxHp;
    }
    updateUI(); updateMenuStats();
  }
  
  function buyUpgrade(key) {
    let up = upgrades[key];
    if(up.level >= up.max) return false;
    let cost = up.baseCost + (up.level * 18);
    if(crystals >= cost) {
      crystals -= cost;
      up.level++;
      applyUpgrades();
      renderMenuUpgrades();
      updateUI(); updateMenuStats();
      sound.playUpgrade();
      return true;
    }
    return false;
  }
  
  function renderMenuUpgrades() {
    const container = document.getElementById('menuUpgradeGrid');
    if(!container) return;
    const list = [
      { key:'speed', name:'🚀 PROPULSEUR', unit: upgrades.speed.display },
      { key:'fireRate', name:'⚡ CADENCE', unit: upgrades.fireRate.display },
      { key:'multiShot', name:'🔫 MULTI-TIRS', unit: upgrades.multiShot.display },
      { key:'shield', name:'🛡️ BOUCLIER', unit: '+1 PV' },
      { key:'damage', name:'💀 DÉGÂTS', unit: '+1 dmg' },
      { key:'regen', name:'❤️ RÉGÉNÉRATION', unit: '1PV/5s' },
      { key:'crystalBonus', name:'💰 BONUS CRYSTAL', unit: '+2 💎' },
      { key:'critChance', name:'🎯 CRITIQUE', unit: '+6% crit' },
      { key:'pierce', name:'🔁 TRAVERSANT', unit: 'pénétration' },
      { key:'magnet', name:'🧲 MAGNÉTISME', unit: 'attire' },
      { key:'explosion', name:'💥 EXPLOSION', unit: 'zone dmg' },
      { key:'maxHpRegen', name:'🏆 ARMURE', unit: '+2 PV' }
    ];
    container.innerHTML = '';
    for(let item of list) {
      let up = upgrades[item.key];
      let cost = up.baseCost + (up.level * 18);
      let isMax = up.level >= up.max;
      let card = document.createElement('div');
      card.className = 'upgrade-card-menu';
      card.innerHTML = `
        <div class="upgrade-name-menu">${item.name} [${up.level}/${up.max}]</div>
        <div class="upgrade-level-menu">${item.unit}</div>
        <div class="upgrade-desc-menu">${up.desc}</div>
        <div class="upgrade-cost-menu">💰 ${isMax ? 'MAX' : cost + ' 💎'}</div>
        <button class="upgrade-btn-menu ${isMax ? 'disabled' : ''}" data-upgrade="${item.key}">${isMax ? 'COMPLET' : 'AMÉLIORER'}</button>
      `;
      container.appendChild(card);
    }
    document.querySelectorAll('.upgrade-btn-menu').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        let key = btn.dataset.upgrade;
        buyUpgrade(key);
      });
    });
  }
  
  function updateMenuStats() {
    document.getElementById('menuCrystals').innerText = crystals;
    document.getElementById('statSpeed').innerText = upgrades.speed.level;
    document.getElementById('statRate').innerText = upgrades.fireRate.level;
    document.getElementById('statMulti').innerText = upgrades.multiShot.level;
    document.getElementById('statShield').innerText = upgrades.shield.level;
    document.getElementById('statDmg').innerText = upgrades.damage.level;
    document.getElementById('statRegen').innerText = upgrades.regen.level;
    document.getElementById('statCrystalBonus').innerText = upgrades.crystalBonus.level;
  }
  
  function initStars() { stars = []; for(let i=0;i<180;i++) stars.push({ x: Math.random()*W, y: Math.random()*H, size: Math.random()*2+1, speed: 0.3+Math.random() }); }
  
  function initGame() {
    score = 0; frame = 0; difficulty = 1.0; gameState = 'playing';
    player = {
      x: W/2, y: H-70, w:32, h:36,
      hp: 3 + upgrades.shield.level + upgrades.maxHpRegen.effect()*2,
      maxHp: 3 + upgrades.shield.level + upgrades.maxHpRegen.effect()*2,
      speed: upgrades.speed.effect(),
      fireDelay: upgrades.fireRate.effect(),
      multiShot: upgrades.multiShot.effect(),
      damageBonus: upgrades.damage.effect(),
      crystalBonus: upgrades.crystalBonus.effect(),
      regen: upgrades.regen.level,
      critChance: upgrades.critChance.effect(),
      pierce: upgrades.pierce.level,
      magnetRange: upgrades.magnet.effect(),
      explosion: upgrades.explosion.level,
      invincible: 0, regenCounter: 0
    };
    bullets = []; enemies = []; pickups = []; particles = [];
    lastShot = 0;
    updateUI();
  }
  
  function addCrystals(amount) { crystals += amount + (upgrades.crystalBonus.effect()); updateUI(); updateMenuStats(); renderMenuUpgrades(); sound.playCollect(); }
  function updateUI() {
    document.getElementById('scoreDisplay').innerText = score;
    document.getElementById('hiScoreDisplay').innerText = highScore;
    let hearts = '❤️'.repeat(player.hp) + '🖤'.repeat(player.maxHp - player.hp);
    document.getElementById('hpDisplay').innerHTML = hearts;
    document.getElementById('crystalDisplay').innerText = crystals;
    document.getElementById('diffDisplay').innerHTML = difficulty.toFixed(1)+'x';
  }
  function addParticles(x,y,color,count=7) { for(let i=0;i<count;i++) particles.push({ x, y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*4-1, life:0.8, color }); }
  
  function spawnEnemy() {
    let diff = Math.min(2.5, 1 + score/1300);
    difficulty = diff;
    let r = Math.random();
    let enemy;
    if(r<0.4) enemy = { x: Math.random()*(W-70)+35, y:-30, w:32, h:32, hp:1, maxHp:1, vy:2.2+diff*1.2, vx:(Math.random()-0.5)*1.4, scoreVal:10, crystalVal:4, color:"#ff3355" };
    else if(r<0.7) enemy = { x: Math.random()*(W-80)+40, y:-40, w:44, h:44, hp:2+Math.floor(diff), maxHp:2+Math.floor(diff), vy:1.2+diff*0.8, vx:(Math.random()-0.5)*0.9, scoreVal:25, crystalVal:9, color:"#ff7744" };
    else enemy = { x: Math.random()*(W-50)+25, y:-25, w:26, h:26, hp:1, maxHp:1, vy:3.4+diff*1.9, vx:(Math.random()-0.5)*2.3, scoreVal:15, crystalVal:6, color:"#ffaa66" };
    if(score>1000 && Math.random()<0.12 && !enemies.some(e=>e.isBoss)) {
      enemy = { x:W/2-55, y:-90, w:100, h:100, hp:16, maxHp:16, vy:0.7+diff*0.3, vx:(Math.random()-0.5)*0.5, scoreVal:400, crystalVal:70, isBoss:true, color:"#ff0000" };
    }
    enemies.push(enemy);
  }
  
  function spawnPickup() { if(Math.random()<0.3) pickups.push({ x: Math.random()*(W-40)+20, y:-15, w:14, h:14, vy:2, type:'heart' }); }
  
  function fireBullet() {
    let now = Date.now();
    if(now - lastShot < player.fireDelay) return;
    lastShot = now;
    sound.playShoot();
    let baseDmg = 1 + player.damageBonus;
    let shoot = (xOff, yOff, vY) => { bullets.push({ x: player.x+xOff, y: player.y+yOff, w:6, h:12, vy:vY, damage:baseDmg, pierceLeft: player.pierce }); };
    shoot(0, -22, -11.8);
    if(player.multiShot>=1) { shoot(-11, -18, -11); shoot(11, -18, -11); }
    if(player.multiShot>=2) { shoot(-21, -14, -10.2); shoot(21, -14, -10.2); }
    if(player.multiShot>=3) { shoot(-30, -10, -9.6); shoot(30, -10, -9.6); }
    if(player.multiShot>=4) { shoot(-38, -6, -9); shoot(38, -6, -9); }
  }
  
  function updateGame() {
    if(gameState !== 'playing') return;
    let mx=0, my=0;
    if(keys.ArrowLeft||keys.KeyA) mx=-1;
    if(keys.ArrowRight||keys.KeyD) mx=1;
    if(keys.ArrowUp||keys.KeyW) my=-1;
    if(keys.ArrowDown||keys.KeyS) my=1;
    player.x += mx * player.speed;
    player.y += my * player.speed;
    player.x = Math.max(20, Math.min(W-20, player.x));
    player.y = Math.max(50, Math.min(H-30, player.y));
    if(keys.Space) fireBullet();
    if(player.invincible>0) player.invincible--;
    
    if(player.regen>0 && player.hp<player.maxHp) { player.regenCounter++; if(player.regenCounter>240) { player.hp=Math.min(player.maxHp, player.hp+1); player.regenCounter=0; addParticles(player.x,player.y,"#00ffaa",5); sound.playCollect(); } }
    
    let spawnRate = Math.max(34, 72 - Math.floor(score/190));
    if(frame%spawnRate===0) spawnEnemy();
    if(frame%140===0) spawnPickup();
    
    bullets.forEach(b=>b.y+=b.vy);
    bullets = bullets.filter(b=>b.y>-40);
    enemies.forEach(e=>{ e.y+=e.vy; e.x+=e.vx; if(e.x<15||e.x>W-15) e.vx*=-1; });
    enemies = enemies.filter(e=>e.y<H+100);
    pickups.forEach(p=>p.y+=p.vy);
    pickups = pickups.filter(p=>p.y<H+50);
    
    if(player.magnetRange>0) {
      pickups.forEach(p=>{ let dx=player.x-p.x, dy=player.y-p.y, dist=Math.hypot(dx,dy); if(dist<player.magnetRange) { p.x+=dx*0.12; p.y+=dy*0.12; } });
    }
    
    for(let i=bullets.length-1;i>=0;i--) {
      let b=bullets[i]; let hit=false;
      for(let j=enemies.length-1;j>=0;j--) {
        let e=enemies[j];
        if(Math.abs(b.x-e.x)<(e.w/2+6) && Math.abs(b.y-e.y)<(e.h/2+7)) {
          let crit = (Math.random()*100 < player.critChance) ? 2 : 1;
          let finalDmg = b.damage * crit;
          e.hp -= finalDmg;
          addParticles(e.x, e.y, crit>1?"#ffaa00":"#ff8866", 5);
          if(e.hp<=0) {
            score += e.scoreVal;
            addCrystals(e.crystalVal);
            addParticles(e.x, e.y, "#ff0022", 14);
            sound.playExplosion();
            if(player.explosion>0) {
              for(let k=0;k<enemies.length;k++) {
                let near = enemies[k];
                if(Math.hypot(near.x-e.x, near.y-e.y)<65 && near!==e) {
                  near.hp -= player.explosion;
                  if(near.hp<=0) { score+=near.scoreVal; addCrystals(near.crystalVal); enemies.splice(k,1); k--; }
                }
              }
            }
            enemies.splice(j,1);
          }
          b.pierceLeft = (b.pierceLeft||0)-1;
          if(b.pierceLeft<0) { hit=true; break; }
          else { hit=false; continue; }
        }
      }
      if(hit) { bullets.splice(i,1); }
    }
    
    if(player.invincible===0) {
      for(let i=0;i<enemies.length;i++) {
        let e=enemies[i];
        if(Math.abs(player.x-e.x)<(player.w/2+e.w/2) && Math.abs(player.y-e.y)<(player.h/2+e.h/2)) {
          player.hp--; player.invincible=55;
          addParticles(player.x, player.y, "#ff0000", 14);
          sound.playDamage();
          enemies.splice(i,1);
          if(player.hp<=0) { gameState='gameover'; if(score>highScore) { highScore=score; localStorage.setItem('fx_high_v4',highScore); } updateUI(); }
          break;
        }
      }
    }
    
    for(let i=0;i<pickups.length;i++) {
      let p=pickups[i];
      if(Math.abs(player.x-p.x)<18 && Math.abs(player.y-p.y)<18 && p.type==='heart') {
        player.hp = Math.min(player.maxHp, player.hp+1);
        addParticles(p.x,p.y,"#00ffaa",8);
        sound.playCollect();
        pickups.splice(i,1); i--;
      }
    }
    
    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life-=0.025; });
    if(score>highScore) highScore=score;
    updateUI();
    frame++;
  }
  
  function drawStars() { stars.forEach(s=>{ ctx.fillStyle=`rgba(255,100,100,${0.2+s.size*0.12})`; ctx.fillRect(s.x,s.y,s.size,s.size); s.y+=s.speed; if(s.y>H){s.y=0;s.x=Math.random()*W;} }); }
  
  function draw() {
    ctx.fillStyle="#020000"; ctx.fillRect(0,0,W,H);
    drawStars();
    enemies.forEach(e=>{ ctx.shadowBlur=12; ctx.fillStyle="#1a0005"; ctx.strokeStyle=e.color; ctx.lineWidth=2.5; ctx.beginPath(); ctx.rect(e.x-e.w/2,e.y-e.h/2,e.w,e.h); ctx.fill(); ctx.stroke(); if(e.maxHp>1){ ctx.fillStyle="#330000"; ctx.fillRect(e.x-e.w/2,e.y-e.h/2-8,e.w,4); ctx.fillStyle="#ff0022"; ctx.fillRect(e.x-e.w/2,e.y-e.h/2-8,e.w*(e.hp/e.maxHp),4); } if(e.isBoss){ ctx.font="bold 12px monospace"; ctx.fillStyle="#ff0000"; ctx.fillText("BOSS",e.x-20,e.y-15); } });
    pickups.forEach(p=>{ ctx.fillStyle=p.type==='heart'?"#ff44cc":"#ffcc44"; ctx.fillRect(p.x-7,p.y-7,14,14); });
    bullets.forEach(b=>{ ctx.fillStyle="#ff3355"; ctx.fillRect(b.x-3,b.y-6,6,12); });
    if(!(player.invincible>0 && Math.floor(Date.now()/40)%3===0)) {
      ctx.shadowBlur=20; ctx.fillStyle="#0d0000"; ctx.strokeStyle="#ff0022"; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(player.x,player.y-22); ctx.lineTo(player.x+18,player.y+8); ctx.lineTo(player.x+9,player.y+2);
      ctx.lineTo(player.x-9,player.y+2); ctx.lineTo(player.x-18,player.y+8); ctx.fill(); ctx.stroke();
      ctx.fillStyle="#ff0022"; ctx.beginPath(); ctx.ellipse(player.x,player.y-6,8,10,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#ff4422"; ctx.beginPath(); ctx.ellipse(player.x,player.y+12,6,8,0,0,Math.PI*2); ctx.fill();
    }
    particles.forEach(p=>{ ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.fillRect(p.x-2,p.y-2,4,4); ctx.globalAlpha=1; });
    ctx.font="bold 16px 'Courier New'"; ctx.fillStyle="#ff0022"; ctx.fillText(`SCORE ${score}`,15,35);
    ctx.fillStyle="#ffaa44"; ctx.fillText(`💎 ${crystals}`,W-90,35);
    if(gameState==='start') {
      ctx.fillStyle="rgba(0,0,0,0.85)"; ctx.fillRect(0,0,W,H);
      ctx.font="bold 38px monospace"; ctx.fillStyle="#ff0022"; ctx.fillText("FERTUXOX",W/2-110,H/2-40);
      ctx.font="16px monospace"; ctx.fillStyle="white"; ctx.fillText("ESPACE → JOUER | ECHAP → UPGRADES",W/2-180,H/2+30);
    }
    if(gameState==='gameover') {
      ctx.fillStyle="rgba(0,0,0,0.9)"; ctx.fillRect(0,0,W,H);
      ctx.font="bold 38px monospace"; ctx.fillStyle="#ff0022"; ctx.fillText("GAME OVER",W/2-130,H/2-40);
      ctx.font="20px monospace"; ctx.fillStyle="#ffaa44"; ctx.fillText("SCORE: "+score,W/2-60,H/2+20);
    }
  }
  
  // MENU ECHAP
  const escapeMenuDiv = document.getElementById('escapeMenu');
  function openMenu() { if(gameState !== 'start') { escapeMenuDiv.classList.add('active'); gameState='paused'; } }
  function closeMenu() { escapeMenuDiv.classList.remove('active'); if(gameState==='paused') gameState='playing'; }
  window.addEventListener('keydown', (e) => {
    if(e.code === 'Escape') { e.preventDefault(); if(escapeMenuDiv.classList.contains('active')) closeMenu(); else if(gameState==='playing') openMenu(); }
    if(keys.hasOwnProperty(e.code)) keys[e.code]=true;
    if(e.code==='Space') { e.preventDefault(); fireBullet(); if(gameState==='start') initGame(); if(gameState==='gameover') initGame(); }
  });
  window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code]=false; });
  document.getElementById('restartButton').addEventListener('click',()=>initGame());
  document.getElementById('closeMenuBtn').addEventListener('click',closeMenu);
  document.getElementById('resumeGameBtn').addEventListener('click',closeMenu);
  
  initStars();
  applyUpgrades();
  renderMenuUpgrades();
  updateMenuStats();
  initGame();
  gameState='start';
  function gameLoop() { updateGame(); draw(); requestAnimationFrame(gameLoop); }
  gameLoop();
</script>
</body>
