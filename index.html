<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rogue Survivor - Map Magnifique & Ennemis Rapides</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e, #060610);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #ui {
            position: fixed;
            top: 15px;
            left: 15px;
            right: 15px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
            pointer-events: none;
            z-index: 10;
            font-size: 13px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .stat-card {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 5px 12px;
            border-left: 3px solid #ffaa44;
            font-family: monospace;
        }

        .hp-bar-bg {
            background: #330000;
            height: 12px;
            width: 200px;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 3px;
        }

        .hp-bar-fill {
            background: linear-gradient(90deg, #ff4444, #ff8888);
            height: 100%;
            width: 100%;
            transition: width 0.2s;
        }

        .xp-bar-bg {
            background: #1a2a1a;
            height: 8px;
            width: 200px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 3px;
        }

        .xp-bar-fill {
            background: linear-gradient(90deg, #44ff44, #aaffaa);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .shop-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffaa44, #ff8844);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            z-index: 100;
            font-family: monospace;
            box-shadow: 0 0 20px rgba(255,170,68,0.5);
            transition: transform 0.2s;
        }

        .shop-btn:hover {
            transform: scale(1.05);
        }

        .shop-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #0f0f1f, #050510);
            border: 3px solid #ffcc44;
            border-radius: 28px;
            padding: 20px;
            color: white;
            text-align: center;
            z-index: 1000;
            width: 650px;
            max-height: 85vh;
            overflow-y: auto;
            font-family: monospace;
            pointer-events: auto;
            box-shadow: 0 0 100px rgba(0,0,0,0.95);
            animation: slideIn 0.3s ease;
        }

        .shop-panel h2 {
            margin-bottom: 15px;
            color: #ffcc44;
        }

        .shop-panel .crystals-display {
            font-size: 24px;
            margin-bottom: 15px;
            color: #ffaa44;
        }

        .shop-category {
            margin: 15px 0 10px;
            padding: 5px;
            background: rgba(255,170,68,0.2);
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #ffcc44;
        }

        .shop-item {
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffaa44;
            border-radius: 10px;
            padding: 8px 12px;
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .shop-item:hover {
            background: rgba(255,170,68,0.2);
            transform: scale(1.01);
        }

        .shop-item .info {
            text-align: left;
            flex: 1;
        }

        .shop-item .name {
            font-weight: bold;
            font-size: 14px;
        }

        .shop-item .desc {
            font-size: 10px;
            color: #aaa;
        }

        .shop-item .price {
            color: #ffaa44;
            font-weight: bold;
            font-size: 16px;
            min-width: 60px;
            text-align: right;
        }

        .shop-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .close-shop {
            background: #ff4444;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .close-shop:hover {
            background: #ff6666;
            transform: scale(1.02);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a0000, #000000);
            border: 3px solid #ff4444;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            z-index: 2000;
            color: white;
            min-width: 350px;
        }

        button {
            background: linear-gradient(135deg, #ff6600, #ff4400);
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .info-text {
            position: fixed;
            bottom: 15px;
            left: 15px;
            color: #ccc;
            font-size: 11px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 10;
        }
        
        .kill-counter {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.8);
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: bold;
            color: #ffaa44;
            backdrop-filter: blur(4px);
            font-size: 16px;
            pointer-events: none;
            z-index: 10;
        }

        .wave-counter {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: bold;
            color: #ff44aa;
            backdrop-filter: blur(4px);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }

        .enemy-counter {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: bold;
            color: #ff6666;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes slideIn {
            from { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
<div id="ui">
    <div class="stat-card">❤️ SANTÉ <div class="hp-bar-bg"><div id="hpFill" class="hp-bar-fill"></div></div></div>
    <div class="stat-card">⭐ XP <div class="xp-bar-bg"><div id="xpFill" class="xp-bar-fill"></div></div></div>
    <div class="stat-card">📊 NIVEAU <span id="levelDisplay">1</span> | 💥 DÉGÂTS: <span id="dmgDisplay">22</span></div>
    <div class="stat-card">💰 CRYSTAUX: <span id="crystalCount">100</span> | ⚡ VITESSE: <span id="spdDisplay">380</span></div>
</div>
<div class="kill-counter">💀 <span id="killCount">0</span> éliminés</div>
<div class="wave-counter">🌊 VAGUE <span id="waveCount">1</span></div>
<div class="enemy-counter">👥 ENNEMIS: <span id="enemyCount">0</span></div>
<button class="shop-btn" id="shopBtn">🛒 BOUTIQUE (E)</button>
<div id="shopPanel" style="display: none;" class="shop-panel"></div>
<div id="gameOverPanel" style="display: none;" class="game-over"></div>
<div class="info-text">🎮 ZQSD/WASD | 🖱️ Clic gauche = Attaque | ␣ Dash | E = Boutique | Ennemis rapides !</div>
<canvas id="gameCanvas" width="1600" height="1000"></canvas>

<script>
    (function(){
        // ========== CANVAS ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const WORLD_WIDTH = 3500;
        const WORLD_HEIGHT = 2500;
        
        let camera = { x: 0, y: 0 };
        let gameRunning = true;
        let shopOpen = false;
        let frame = 0;
        let enemies = [];
        let projectiles = [];
        let particles = [];
        let killCount = 0;
        
        // Effets de map
        let grassPatches = [];
        let flowers = [];
        let trees = [];
        
        // Générer les éléments de la map
        for(let i=0;i<300;i++){
            grassPatches.push({
                x: Math.random() * WORLD_WIDTH,
                y: Math.random() * WORLD_HEIGHT,
                size: 5 + Math.random() * 15,
                color: `rgba(60,120,40,${0.1 + Math.random()*0.2})`
            });
        }
        for(let i=0;i<150;i++){
            flowers.push({
                x: Math.random() * WORLD_WIDTH,
                y: Math.random() * WORLD_HEIGHT,
                color: `hsl(${Math.random() * 60 + 280}, 70%, 60%)`,
                size: 3 + Math.random() * 4
            });
        }
        for(let i=0;i<50;i++){
            trees.push({
                x: Math.random() * WORLD_WIDTH,
                y: Math.random() * WORLD_HEIGHT,
                size: 15 + Math.random() * 20
            });
        }
        
        // ========== DIFFICULTÉ PROGRESSIVE ==========
        let currentWave = 1;
        
        // ========== SYSTEME AUDIO ==========
        let audioContext = null;
        function initAudio() {
            if(audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playSound(type, volume=0.2) {
            if(!audioContext) return;
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                gain.gain.value = volume;
                
                if(type === 'shoot') {
                    osc.frequency.value = 880;
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.12);
                } else if(type === 'hit') {
                    osc.frequency.value = 300;
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.1);
                } else if(type === 'levelup') {
                    osc.frequency.value = 523.25;
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.15);
                    setTimeout(()=>{
                        const osc2 = audioContext.createOscillator();
                        osc2.frequency.value = 659.25;
                        osc2.connect(gain);
                        osc2.start();
                        osc2.stop(audioContext.currentTime + 0.15);
                    },100);
                } else if(type === 'pickup') {
                    osc.frequency.value = 1318.52;
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.08);
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.08);
                }
            } catch(e) {}
        }
        
        // ========== JOUEUR ==========
        let player = {
            x: WORLD_WIDTH/2, y: WORLD_HEIGHT/2,
            hp: 220, maxHp: 220,
            xp: 0, level: 1, xpToNext: 40,
            crystals: 100,
            baseDamage: 22,
            attackSpeed: 2.5,
            attackTimer: 0,
            moveSpeed: 380,
            regen: 2.5,
            critChance: 0.15,
            critDamage: 1.8,
            projectileCount: 2,
            pierce: true,
            bounce: 1,
            hasShield: false,
            shieldAngle: 0,
            chainLightning: true,
            fireAura: false,
            poisonAura: false,
            slowEnemies: false,
            extraLoot: 1,
            dashAvailable: true,
            invincibilityTimer: 0,
            fireball: false,
            meteor: false,
            iceShard: false,
            poisonDart: false,
            holyRay: false,
            orbitingOrbs: 0,
            clone: false,
            tornado: false,
            lifeSteal: 5,
            explosionOnDeath: false,
            doubleShot: false
        };
        
        let companions = [];
        let lastTime = performance.now();
        let mouseX = canvas.width/2, mouseY = canvas.height/2;
        let mouseDown = false;
        const keys = { up: false, down: false, left: false, right: false };
        
        // ========== AMÉLIORATIONS ==========
        const shopItems = [
            { id: "dmg", name: "🔥 Dégâts +5", desc: "Augmente vos dégâts", basePrice: 35, effect: (p) => p.baseDamage += 5, maxLevel: 20, level: 0, cat: "⚔️ Offensives" },
            { id: "aspeed", name: "⚡ Cadence +0.25", desc: "Attaque plus rapide", basePrice: 35, effect: (p) => p.attackSpeed += 0.25, maxLevel: 15, level: 0, cat: "⚔️ Offensives" },
            { id: "crit", name: "🎯 Critique +10%", desc: "Chance critique augmentée", basePrice: 45, effect: (p) => { p.critChance = Math.min(0.7, p.critChance + 0.1); }, maxLevel: 8, level: 0, cat: "⚔️ Offensives" },
            { id: "projectile", name: "🏹 Projectile +1", desc: "Tire un projectile de plus", basePrice: 90, effect: (p) => p.projectileCount++, maxLevel: 5, level: 0, cat: "⚔️ Offensives" },
            { id: "pierce", name: "🌟 Perforation+", desc: "Traverse tous les ennemis", basePrice: 70, effect: (p) => p.pierce = true, maxLevel: 1, level: 0, cat: "⚔️ Offensives", unique: true },
            { id: "bounce", name: "🔄 Rebond x3", desc: "Rebondit sur les ennemis", basePrice: 65, effect: (p) => p.bounce += 3, maxLevel: 4, level: 0, cat: "⚔️ Offensives" },
            { id: "doubleShot", name: "💥 Double tir", desc: "Tire deux projectiles en V", basePrice: 110, effect: (p) => p.doubleShot = true, maxLevel: 1, level: 0, cat: "⚔️ Offensives", unique: true },
            { id: "fireball", name: "🔥 Boule de feu", desc: "Explosion à l'impact", basePrice: 120, effect: (p) => p.fireball = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "lightning", name: "⚡ Éclairs maîtres", desc: "Chaîne électrique puissante", basePrice: 110, effect: (p) => p.chainLightning = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "meteor", name: "☄️ Pluie de météores", desc: "Météores sur zone", basePrice: 180, effect: (p) => p.meteor = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "iceShard", name: "❄️ Tempête de glace", desc: "Ralentit zone", basePrice: 100, effect: (p) => p.iceShard = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "poisonDart", name: "☠️ Pluie de poison", desc: "Poison sur zone", basePrice: 95, effect: (p) => p.poisonDart = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "holyRay", name: "✨ Rayon sacré", desc: "Laser qui traverse", basePrice: 140, effect: (p) => p.holyRay = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "tornado", name: "🌪️ Tornade", desc: "Aspire les ennemis", basePrice: 150, effect: (p) => p.tornado = true, maxLevel: 1, level: 0, cat: "✨ Magie", unique: true },
            { id: "fireAura", name: "🔥 Aura infernale", desc: "Brûle ennemis proches", basePrice: 100, effect: (p) => p.fireAura = true, maxLevel: 1, level: 0, cat: "🌀 Auras", unique: true },
            { id: "poisonAura", name: "☠️ Aura toxique", desc: "Empoisonne zone", basePrice: 100, effect: (p) => p.poisonAura = true, maxLevel: 1, level: 0, cat: "🌀 Auras", unique: true },
            { id: "orbitingOrbs", name: "🪐 Orbes tournants x1", desc: "Orbes protecteurs", basePrice: 120, effect: (p) => p.orbitingOrbs++, maxLevel: 5, level: 0, cat: "🌀 Auras" },
            { id: "shield", name: "🛡️ Bouclier", desc: "Bouclier défensif", basePrice: 100, effect: (p) => p.hasShield = true, maxLevel: 1, level: 0, cat: "🌀 Auras", unique: true },
            { id: "hp", name: "❤️ Vie +50", desc: "Augmente la vie max", basePrice: 45, effect: (p) => { p.maxHp += 50; p.hp += 50; }, maxLevel: 10, level: 0, cat: "🛡️ Survie" },
            { id: "regen", name: "🩸 Régénération +2", desc: "Récupération de vie", basePrice: 55, effect: (p) => p.regen += 2, maxLevel: 8, level: 0, cat: "🛡️ Survie" },
            { id: "lifeSteal", name: "💉 Vol de vie +8%", desc: "Récupère des PV", basePrice: 100, effect: (p) => p.lifeSteal += 8, maxLevel: 5, level: 0, cat: "🛡️ Survie" },
            { id: "speed", name: "👟 Vitesse +30", desc: "Déplacement rapide", basePrice: 40, effect: (p) => p.moveSpeed += 30, maxLevel: 10, level: 0, cat: "🛡️ Survie" },
            { id: "slow", name: "❄️ Ralentissement", desc: "Ralentit les ennemis", basePrice: 80, effect: (p) => p.slowEnemies = true, maxLevel: 1, level: 0, cat: "📦 Utilitaires", unique: true },
            { id: "loot", name: "💎 Loot +50%", desc: "Plus de cristaux", basePrice: 60, effect: (p) => p.extraLoot++, maxLevel: 8, level: 0, cat: "📦 Utilitaires" },
            { id: "explosion", name: "💥 Explosion chaîne", desc: "Explosions en chaîne", basePrice: 90, effect: (p) => p.explosionOnDeath = true, maxLevel: 1, level: 0, cat: "📦 Utilitaires", unique: true },
            { id: "clone", name: "👥 Double clone", desc: "Deux clones attaquants", basePrice: 150, effect: (p) => { if(!p.clone) { companions.push({ x: p.x, y: p.y, timer: 999, type: 'clone' }); companions.push({ x: p.x, y: p.y, timer: 999, type: 'clone' }); p.clone = true; } }, maxLevel: 1, level: 0, cat: "📦 Utilitaires", unique: true },
            { id: "companion", name: "🐉 Dragon x2", desc: "Deux dragons", basePrice: 140, effect: (p) => { companions.push({ x: p.x, y: p.y, timer: 999, type: 'dragon' }); }, maxLevel: 3, level: 0, cat: "📦 Utilitaires" }
        ];
        
        // ========== ENNEMIS TRÈS RAPIDES ==========
        class Enemy {
            constructor(x, y, type, waveLevel) {
                this.x = x; this.y = y; this.type = type;
                const waveBonus = 1 + (waveLevel - 1) * 0.07;
                this.poisonTimer = 0;
                this.chargeCooldown = 0;
                
                if(type === 'slow'){
                    this.hp = 18 * waveBonus;
                    this.maxHp = 18 * waveBonus;
                    this.speed = 65 + (waveLevel-1) * 2.5; // Plus rapide
                    this.damage = 4 + Math.floor((waveLevel-1) * 0.4);
                    this.size = 26;
                    this.color = '#8B6914';
                    this.xpValue = 10;
                    this.crystalValue = 3 + Math.floor(Math.random() * 3);
                } else if(type === 'fast'){
                    this.hp = 10 * waveBonus;
                    this.maxHp = 10 * waveBonus;
                    this.speed = 220 + (waveLevel-1) * 5; // Très rapide !
                    this.damage = 2 + Math.floor((waveLevel-1) * 0.25);
                    this.size = 18;
                    this.color = '#CD7F32';
                    this.xpValue = 8;
                    this.crystalValue = 2 + Math.floor(Math.random() * 2);
                } else if(type === 'tank'){
                    this.hp = 40 * waveBonus;
                    this.maxHp = 40 * waveBonus;
                    this.speed = 45 + (waveLevel-1) * 1.5;
                    this.damage = 6 + Math.floor((waveLevel-1) * 0.6);
                    this.size = 38;
                    this.color = '#5D3A1A';
                    this.xpValue = 20;
                    this.crystalValue = 5 + Math.floor(Math.random() * 4);
                } else if(type === 'ranged'){
                    this.hp = 12 * waveBonus;
                    this.maxHp = 12 * waveBonus;
                    this.speed = 90 + (waveLevel-1) * 3;
                    this.damage = 3 + Math.floor((waveLevel-1) * 0.3);
                    this.size = 20;
                    this.color = '#9370DB';
                    this.xpValue = 9;
                    this.crystalValue = 3 + Math.floor(Math.random() * 2);
                    this.shootCooldown = 0;
                } else {
                    this.hp = 12 * waveBonus;
                    this.maxHp = 12 * waveBonus;
                    this.speed = 100 + (waveLevel-1) * 3;
                    this.damage = 3 + Math.floor((waveLevel-1) * 0.3);
                    this.size = 20;
                    this.color = '#8B4513';
                    this.xpValue = 9;
                    this.crystalValue = 3 + Math.floor(Math.random() * 2);
                }
                this.shootCooldown = 0;
                this.pattern = Math.random() * Math.PI * 2;
            }
            
            update(delta, playerX, playerY){
                if(shopOpen) return;
                if(this.poisonTimer > 0) { this.hp -= 8 * delta; this.poisonTimer -= delta; }
                if(this.chargeCooldown > 0) this.chargeCooldown -= delta;
                
                const dx = playerX - this.x, dy = playerY - this.y;
                const len = Math.hypot(dx,dy);
                
                // Effet d'attraction : les ennemis se dirigent directement vers le joueur plus agressivement
                let speedBonus = 1;
                if(this.type === 'fast') speedBonus = 1.3;
                if(this.type === 'charger' && this.chargeCooldown <= 0 && len < 250){
                    speedBonus = 2.5;
                    this.chargeCooldown = 2;
                }
                
                if(this.type === 'ranged'){
                    if(len>0.01){
                        this.x += (dx/len) * this.speed * delta * 1.2;
                        this.y += (dy/len) * this.speed * delta * 1.2;
                    }
                    if(this.shootCooldown <= 0 && len < 380){
                        const angle = Math.atan2(dy, dx);
                        projectiles.push({
                            x: this.x, y: this.y, vx: Math.cos(angle)*220, vy: Math.sin(angle)*220,
                            damage: this.damage, friendly: false, size: 6, color: '#FF6666', range: 650, traveled: 0
                        });
                        this.shootCooldown = 1.0;
                    }
                } else {
                    if(len>0.01){
                        this.x += (dx/len) * this.speed * delta * speedBonus;
                        this.y += (dy/len) * this.speed * delta * speedBonus;
                    }
                }
                
                if(this.shootCooldown > 0) this.shootCooldown -= delta;
                this.pattern += delta * 4;
            }
            
            draw(ctx, camera){
                const sx = this.x - camera.x, sy = this.y - camera.y;
                if(sx + this.size < 0 || sx - this.size > canvas.width) return;
                ctx.save();
                ctx.shadowBlur = 6;
                // Effet de traînée pour les ennemis rapides
                if(this.type === 'fast'){
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = "rgba(255,100,0,0.5)";
                }
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(sx, sy, this.size, 0, Math.PI*2); ctx.fill();
                
                // Yeux plus agressifs
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(sx-7, sy-5, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(sx+7, sy-5, 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#FF0000";
                ctx.beginPath(); ctx.arc(sx-6 + Math.sin(this.pattern)*3, sy-5, 2.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(sx+8 + Math.cos(this.pattern)*3, sy-5, 2.5, 0, Math.PI*2); ctx.fill();
                
                const hpPercent = this.hp/this.maxHp;
                if(hpPercent < 1){
                    ctx.fillStyle = "#330000";
                    ctx.fillRect(sx-20, sy-this.size-8, 40, 4);
                    ctx.fillStyle = hpPercent > 0.6 ? '#44ff44' : (hpPercent > 0.3 ? '#ffaa44' : '#ff4444');
                    ctx.fillRect(sx-20, sy-this.size-8, 40 * hpPercent, 4);
                }
                ctx.restore();
            }
        }
        
        let spawnTimer = 0;
        let enemiesThisWave = 0;
        let waveEnemiesCount = 25; // Encore plus d'ennemis
        
        function nextWave() {
            currentWave++;
            document.getElementById('waveCount').innerText = currentWave;
            waveEnemiesCount = Math.min(70, 25 + Math.floor(currentWave * 1.8));
            enemiesThisWave = 0;
            player.crystals += 15 + currentWave;
            addFloatingText(player.x, player.y, `VAGUE ${currentWave}! +${15+currentWave}💰`, '#FF44FF');
            updateUI();
        }
        
        function spawnEnemy(){
            let side = Math.floor(Math.random()*4);
            let x, y;
            if(side===0){ x = Math.random()*WORLD_WIDTH; y = -80; }
            else if(side===1){ x = WORLD_WIDTH+80; y = Math.random()*WORLD_HEIGHT; }
            else if(side===2){ x = Math.random()*WORLD_WIDTH; y = WORLD_HEIGHT+80; }
            else { x = -80; y = Math.random()*WORLD_HEIGHT; }
            
            let types = ['slow', 'fast', 'tank'];
            if(currentWave > 2) types.push('ranged');
            if(currentWave > 4) types.push('fast');
            if(currentWave > 8) types.push('tank');
            
            let type = types[Math.floor(Math.random()*types.length)];
            enemies.push(new Enemy(x,y,type, currentWave));
            enemiesThisWave++;
            document.getElementById('enemyCount').innerText = enemies.length;
        }
        
        // ========== PROJECTILES ==========
        function shootProjectile(angle){
            let count = player.projectileCount;
            if(player.doubleShot) count = Math.max(count, 2);
            
            for(let i=0;i<count;i++){
                let angleOffset = (count>1) ? (i - (count-1)/2) * 0.2 : 0;
                let finalAngle = angle + angleOffset;
                let damage = player.baseDamage * (Math.random()<player.critChance ? player.critDamage : 1);
                let color = '#FFDD88';
                let size = 10;
                
                if(player.fireball) { color = '#FF6600'; size = 12; }
                if(player.iceShard) { color = '#88CCFF'; }
                if(player.poisonDart) { color = '#88FF88'; }
                if(player.holyRay) { color = '#FFFFFF'; size = 8; }
                
                projectiles.push({
                    x: player.x, y: player.y, 
                    vx: Math.cos(finalAngle)*800, vy: Math.sin(finalAngle)*800,
                    damage: damage, friendly: true, size: size, color: color,
                    range: 1300, traveled: 0, pierce: player.pierce, bounceLeft: player.bounce,
                    poison: player.poisonDart, fireball: player.fireball, ice: player.iceShard
                });
            }
            playSound('shoot', 0.12);
        }
        
        let meteorTimer = 0;
        function updateMeteors(delta){
            if(!player.meteor) return;
            meteorTimer -= delta;
            if(meteorTimer <= 0 && enemies.length > 0){
                meteorTimer = 1.8;
                let meteorCount = Math.min(6, 3 + Math.floor(currentWave/8));
                for(let m=0;m<meteorCount;m++){
                    let target = enemies[Math.floor(Math.random()*enemies.length)];
                    if(target){
                        let offsetX = (Math.random()-0.5)*150;
                        let offsetY = (Math.random()-0.5)*150;
                        projectiles.push({
                            x: target.x+offsetX, y: target.y+offsetY-60,
                            vx: 0, vy: 400,
                            damage: player.baseDamage * 1.4,
                            friendly: true, size: 14, color: '#FF8844',
                            range: 200, traveled: 0, pierce: true, isMeteor: true
                        });
                    }
                }
                addParticles(player.x, player.y, '#FF8844', 15);
            }
        }
        
        let tornadoActive = null;
        function updateTornado(delta){
            if(!player.tornado) return;
            if(!tornadoActive && enemies.length > 0){
                let target = enemies[0];
                tornadoActive = { x: target.x, y: target.y, timer: 4 };
            }
            if(tornadoActive){
                tornadoActive.timer -= delta;
                for(let e of enemies){
                    if(Math.hypot(e.x - tornadoActive.x, e.y - tornadoActive.y) < 120){
                        e.hp -= 35 * delta;
                        let angle = Math.atan2(e.y - tornadoActive.y, e.x - tornadoActive.x);
                        e.x += Math.cos(angle) * 80 * delta;
                        e.y += Math.sin(angle) * 80 * delta;
                    }
                }
                if(tornadoActive.timer <= 0) tornadoActive = null;
            }
        }
        
        function updateCombat(delta){
            if(shopOpen) return;
            
            if(player.attackTimer <= 0 && mouseDown && gameRunning){
                const dx = mouseX - (player.x - camera.x);
                const dy = mouseY - (player.y - camera.y);
                shootProjectile(Math.atan2(dy, dx));
                player.attackTimer = 1.0 / player.attackSpeed;
            }
            if(player.attackTimer > 0) player.attackTimer -= delta;
            
            player.hp = Math.min(player.maxHp, player.hp + player.regen * delta);
            if(player.invincibilityTimer > 0) player.invincibilityTimer -= delta;
            
            if(player.fireAura){
                for(let e of enemies){
                    if(Math.hypot(e.x - player.x, e.y - player.y) < 120) e.hp -= 28 * delta;
                }
            }
            if(player.poisonAura){
                for(let e of enemies){
                    if(Math.hypot(e.x - player.x, e.y - player.y) < 120) e.poisonTimer = 1.5;
                }
            }
            
            if(player.orbitingOrbs > 0){
                for(let i=0;i<player.orbitingOrbs;i++){
                    let angle = Date.now() * 0.006 + i * (Math.PI*2/player.orbitingOrbs);
                    let x = player.x + Math.cos(angle)*52;
                    let y = player.y + Math.sin(angle)*52;
                    for(let e of enemies){
                        if(Math.hypot(e.x - x, e.y - y) < 24) e.hp -= 20 * delta;
                    }
                }
            }
            
            for(let i=0;i<projectiles.length;i++){
                let p = projectiles[i];
                p.x += p.vx * delta;
                p.y += p.vy * delta;
                p.traveled += Math.hypot(p.vx*delta, p.vy*delta);
                if(p.traveled > p.range){
                    projectiles.splice(i,1); i--; continue;
                }
                
                for(let j=0;j<enemies.length;j++){
                    let e = enemies[j];
                    if(Math.hypot(p.x - e.x, p.y - e.y) < e.size+5 && p.friendly){
                        let finalDamage = p.damage;
                        e.hp -= finalDamage;
                        if(p.poison) e.poisonTimer = 2;
                        if(player.lifeSteal > 0) player.hp = Math.min(player.maxHp, player.hp + finalDamage * player.lifeSteal / 100);
                        addParticles(e.x, e.y, p.fireball ? '#FF6600' : '#FFAA66', 4);
                        
                        if(player.chainLightning && Math.random()<0.55){
                            let chainTargets = 0;
                            for(let other of enemies){
                                if(other !== e && Math.hypot(e.x-other.x, e.y-other.y) < 140 && chainTargets < 4){
                                    other.hp -= p.damage * 0.7;
                                    addParticles(other.x, other.y, '#88FFFF', 5);
                                    chainTargets++;
                                }
                            }
                        }
                        
                        if(player.explosionOnDeath && e.hp <= 0){
                            for(let other of enemies){
                                if(Math.hypot(e.x-other.x, e.y-other.y) < 70) other.hp -= 22;
                            }
                        }
                        
                        if(!p.pierce && p.bounceLeft <= 0){
                            projectiles.splice(i,1); i--; break;
                        } else if(p.bounceLeft > 0){
                            p.bounceLeft--;
                            let closest = null, minDist = 160;
                            for(let oe of enemies){
                                if(oe !== e && Math.hypot(p.x-oe.x, p.y-oe.y) < minDist){
                                    closest = oe; minDist = Math.hypot(p.x-oe.x, p.y-oe.y);
                                }
                            }
                            if(closest){
                                let angle = Math.atan2(closest.y - p.y, closest.x - p.x);
                                p.vx = Math.cos(angle) * 700; p.vy = Math.sin(angle) * 700;
                            } else { projectiles.splice(i,1); break; }
                        }
                        break;
                    }
                }
            }
            
            updateMeteors(delta);
            updateTornado(delta);
            
            for(let i=0;i<enemies.length;i++){
                if(enemies[i].hp <= 0){
                    let e = enemies[i];
                    player.xp += e.xpValue;
                    let earned = e.crystalValue + Math.floor(Math.random() * player.extraLoot);
                    player.crystals += earned;
                    killCount++;
                    document.getElementById('killCount').innerText = killCount;
                    addParticles(e.x, e.y, '#FFD700', 12);
                    addFloatingText(e.x, e.y, `+${earned}💰`, '#FFD700');
                    enemies.splice(i,1); i--;
                    document.getElementById('enemyCount').innerText = enemies.length;
                    updateUI();
                }
            }
            
            if(enemies.length === 0 && enemiesThisWave >= waveEnemiesCount) {
                nextWave();
            }
            
            if(player.xp >= player.xpToNext){
                player.xp -= player.xpToNext;
                player.level++;
                player.xpToNext = Math.floor(40 + player.level * 12);
                player.hp = Math.min(player.maxHp, player.hp + 20);
                player.crystals += 15;
                addFloatingText(player.x, player.y, `LEVEL ${player.level}! +15💰`, '#44FF44');
                playSound('levelup', 0.3);
                updateUI();
            }
        }
        
        let floatingTexts = [];
        function addFloatingText(x, y, text, color){
            floatingTexts.push({ x: x, y: y, text: text, color: color, life: 1.0 });
        }
        
        function updateFloatingTexts(delta){
            for(let i=0;i<floatingTexts.length;i++){
                let t = floatingTexts[i];
                t.y -= 30 * delta; t.life -= delta;
                if(t.life <= 0){ floatingTexts.splice(i,1); i--; }
            }
        }
        
        function updateUI(){
            document.getElementById('hpFill').style.width = `${(player.hp/player.maxHp)*100}%`;
            let xpPercent = (player.xp/player.xpToNext)*100;
            document.getElementById('xpFill').style.width = `${xpPercent}%`;
            document.getElementById('levelDisplay').innerText = player.level;
            document.getElementById('dmgDisplay').innerText = Math.floor(player.baseDamage);
            document.getElementById('spdDisplay').innerText = Math.floor(player.moveSpeed);
            document.getElementById('crystalCount').innerText = player.crystals;
        }
        
        function addParticles(x,y,color, count=8){
            for(let i=0;i<count;i++){
                particles.push({ x: x, y: y, vx: (Math.random()-0.5)*180, vy: (Math.random()-0.5)*180, life: 0.5, color: color });
            }
        }
        
        function updateParticles(delta){
            for(let i=0;i<particles.length;i++){
                let p = particles[i];
                p.x += p.vx * delta; p.y += p.vy * delta; p.life -= delta;
                if(p.life <= 0){ particles.splice(i,1); i--; }
            }
        }
        
        function updatePlayerMovement(delta){
            if(shopOpen) return;
            let moveX = 0, moveY = 0;
            if(keys.up) moveY -= 1;
            if(keys.down) moveY += 1;
            if(keys.left) moveX -= 1;
            if(keys.right) moveX += 1;
            if(moveX !== 0 || moveY !== 0){ let len = Math.hypot(moveX, moveY); moveX /= len; moveY /= len; }
            player.x += moveX * player.moveSpeed * delta;
            player.y += moveY * player.moveSpeed * delta;
            player.x = Math.min(Math.max(40, player.x), WORLD_WIDTH - 40);
            player.y = Math.min(Math.max(40, player.y), WORLD_HEIGHT - 40);
            
            camera.x = player.x - canvas.width/2;
            camera.y = player.y - canvas.height/2;
            camera.x = Math.min(Math.max(0, camera.x), WORLD_WIDTH - canvas.width);
            camera.y = Math.min(Math.max(0, camera.y), WORLD_HEIGHT - canvas.height);
            
            for(let e of enemies){
                if(Math.hypot(player.x - e.x, player.y - e.y) < e.size + 18){
                    if(player.invincibilityTimer <= 0){
                        player.hp -= e.damage;
                        player.invincibilityTimer = 0.45;
                        addParticles(player.x, player.y, '#FF4444', 10);
                        if(player.hp <= 0) gameOver();
                    }
                }
            }
            if(player.hp <= 0) gameOver();
        }
        
        function spawnWaveLogic(delta){
            if(shopOpen) return;
            if(enemies.length < waveEnemiesCount - enemiesThisWave + 8 && enemiesThisWave < waveEnemiesCount){
                spawnTimer -= delta;
                if(spawnTimer <= 0){
                    let spawnCount = Math.min(4, waveEnemiesCount - enemiesThisWave);
                    for(let i=0;i<spawnCount;i++) spawnEnemy();
                    spawnTimer = 0.35;
                }
            }
        }
        
        function gameOver(){
            gameRunning = false;
            const panel = document.getElementById('gameOverPanel');
            panel.style.display = 'block';
            panel.innerHTML = `<h1>💀 GAME OVER 💀</h1><p>Vague ${currentWave} | Niveau ${player.level}</p><p>💀 ${killCount} ennemis tués</p><p>💰 ${player.crystals} cristaux</p><button onclick="location.reload()">🔁 REJOUER</button>`;
        }
        
        // ========== BOUTIQUE ==========
        function openShop() {
            if(!gameRunning) return;
            shopOpen = true;
            const panel = document.getElementById('shopPanel');
            panel.style.display = 'block';
            refreshShop();
        }
        
        function closeShop() {
            shopOpen = false;
            document.getElementById('shopPanel').style.display = 'none';
        }
        
        function refreshShop() {
            const panel = document.getElementById('shopPanel');
            let categories = {};
            for(let item of shopItems){
                if(!categories[item.cat]) categories[item.cat] = [];
                categories[item.cat].push(item);
            }
            
            let html = `<h2>🛒 BOUTIQUE D'AMÉLIORATIONS 🛒</h2>
                       <div class="crystals-display">💰 ${player.crystals} cristaux</div>
                       <div style="max-height: 550px; overflow-y: auto;">`;
            
            for(let cat in categories){
                html += `<div class="shop-category">${cat}</div>`;
                for(let item of categories[cat]){
                    let price = Math.floor(item.basePrice * (1 + item.level * 0.25));
                    let canBuy = player.crystals >= price && (item.maxLevel === 0 || item.level < item.maxLevel);
                    let maxed = item.level >= item.maxLevel && item.maxLevel > 0;
                    html += `<div class="shop-item ${!canBuy && !maxed ? 'disabled' : ''}" data-id="${item.id}" style="${maxed ? 'opacity:0.5' : ''}">
                                <div class="info">
                                    <div class="name">${item.name} ${item.level > 0 ? `(x${item.level})` : ''}</div>
                                    <div class="desc">${item.desc}</div>
                                </div>
                                <div class="price">${maxed ? 'MAX' : price+'💰'}</div>
                             </div>`;
                }
            }
            html += `</div><button class="close-shop" id="closeShopBtn">FERMER</button>`;
            panel.innerHTML = html;
            
            document.querySelectorAll('.shop-item').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.getAttribute('data-id');
                    const item = shopItems.find(i => i.id === id);
                    if(item){
                        let price = Math.floor(item.basePrice * (1 + item.level * 0.25));
                        if(player.crystals >= price && (item.maxLevel === 0 || item.level < item.maxLevel)){
                            player.crystals -= price;
                            item.effect(player);
                            item.level++;
                            refreshShop();
                            updateUI();
                            addFloatingText(player.x, player.y, `Acheté: ${item.name}`, '#FFAA44');
                            playSound('pickup', 0.15);
                        }
                    }
                });
            });
            document.getElementById('closeShopBtn').addEventListener('click', closeShop);
        }
        
        // ========== DESSIN MAGNIFIQUE ==========
        function drawMap(){
            // Herbe de fond
            for(let p of grassPatches){
                const sx = p.x - camera.x, sy = p.y - camera.y;
                if(sx > -50 && sx < canvas.width+50){
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.ellipse(sx, sy, p.size, p.size*0.6, 0, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            
            // Fleurs
            for(let f of flowers){
                const sx = f.x - camera.x, sy = f.y - camera.y;
                if(sx > -30 && sx < canvas.width+30){
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    ctx.arc(sx, sy, f.size, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#FFD700";
                    ctx.beginPath();
                    ctx.arc(sx, sy, f.size*0.4, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            
            // Arbres
            for(let t of trees){
                const sx = t.x - camera.x, sy = t.y - camera.y;
                if(sx > -40 && sx < canvas.width+40){
                    ctx.fillStyle = "#5D3A1A";
                    ctx.fillRect(sx-4, sy-5, 8, 15);
                    ctx.fillStyle = "#2D5A1A";
                    ctx.beginPath();
                    ctx.ellipse(sx, sy-8, t.size*0.6, t.size*0.8, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#3D7A2A";
                    ctx.beginPath();
                    ctx.ellipse(sx-3, sy-12, t.size*0.4, t.size*0.5, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(sx+3, sy-12, t.size*0.4, t.size*0.5, 0, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }
        
        function draw(){
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Ciel étoilé / aurore
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#0a0a2a');
            grad.addColorStop(1, '#1a2a1a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Étoiles
            for(let i=0;i<100;i++){
                ctx.fillStyle = `rgba(255,255,200,${0.3+Math.sin(Date.now()*0.001+i)*0.2})`;
                ctx.fillRect((i*131)%canvas.width, (i*97)%canvas.height, 2, 2);
            }
            
            // Carte magnifique
            drawMap();
            
            // Ombre portée globale
            ctx.shadowBlur = 8;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            
            for(let e of enemies) e.draw(ctx, camera);
            
            for(let p of projectiles){
                const sx = p.x - camera.x, sy = p.y - camera.y;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 8;
                ctx.beginPath(); ctx.arc(sx, sy, p.size/1.2, 0, Math.PI*2); ctx.fill();
            }
            
            const px = player.x - camera.x, py = player.y - camera.y;
            ctx.shadowBlur = 15;
            // Aura du joueur
            const auraGrad = ctx.createRadialGradient(px, py, 10, px, py, 40);
            auraGrad.addColorStop(0, 'rgba(68,136,255,0.3)');
            auraGrad.addColorStop(1, 'rgba(68,136,255,0)');
            ctx.fillStyle = auraGrad;
            ctx.beginPath(); ctx.arc(px, py, 45, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = '#4488FF';
            ctx.beginPath(); ctx.arc(px, py, 26, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#AADDFF';
            ctx.beginPath(); ctx.arc(px, py, 18, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(px-10, py-8, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(px+10, py-8, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#2244AA';
            ctx.beginPath(); ctx.arc(px-9, py-8, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(px+11, py-8, 3, 0, Math.PI*2); ctx.fill();
            
            const angle = Math.atan2(mouseY - py, mouseX - px);
            ctx.fillStyle = '#FFAA44';
            ctx.beginPath(); ctx.ellipse(px + Math.cos(angle)*28, py + Math.sin(angle)*28, 16, 7, angle, 0, Math.PI*2); ctx.fill();
            
            for(let c of companions){
                const cx = c.x - camera.x, cy = c.y - camera.y;
                ctx.fillStyle = '#55FF55';
                ctx.beginPath(); ctx.arc(cx, cy, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#AAFFAA';
                ctx.beginPath(); ctx.arc(cx-3, cy-3, 4, 0, Math.PI*2); ctx.fill();
            }
            
            if(player.hasShield){
                for(let i=0;i<3;i++){
                    let ang = player.shieldAngle + i * 2.094;
                    let sx = px + Math.cos(ang)*48, sy = py + Math.sin(ang)*48;
                    ctx.fillStyle = '#44FFAA';
                    ctx.beginPath(); ctx.arc(sx, sy, 12, 0, Math.PI*2); ctx.fill();
                }
                player.shieldAngle += 5 * 0.016;
            }
            
            for(let p of particles){
                const sx = p.x - camera.x, sy = p.y - camera.y;
                ctx.fillStyle = p.color;
                ctx.fillRect(sx-2, sy-2, 4, 4);
            }
            
            for(let t of floatingTexts){
                const sx = t.x - camera.x, sy = t.y - camera.y;
                ctx.font = 'bold 18px monospace';
                ctx.fillStyle = t.color;
                ctx.shadowBlur = 6;
                ctx.fillText(t.text, sx-18, sy-25);
            }
            
            ctx.shadowBlur = 0;
            if(shopOpen){
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }
        
        // ========== COMPAGNONS ==========
        function updateCompanions(delta){
            if(shopOpen) return;
            for(let i=0;i<companions.length;i++){
                let c = companions[i];
                let target = enemies[0];
                if(target){
                    let angle = Math.atan2(target.y - player.y, target.x - player.x);
                    c.x = player.x + Math.cos(angle + Math.sin(Date.now()*0.01)*0.5)*42;
                    c.y = player.y + Math.sin(angle + Math.cos(Date.now()*0.01)*0.5)*42;
                    if(frame % 18 === 0){
                        let shootAngle = Math.atan2(target.y - c.y, target.x - c.x);
                        projectiles.push({
                            x: c.x, y: c.y, vx: Math.cos(shootAngle)*500, vy: Math.sin(shootAngle)*500,
                            damage: player.baseDamage * 0.55, friendly: true, size: 7, color: '#88FF88',
                            range: 600, traveled: 0, pierce: false
                        });
                    }
                } else {
                    c.x = player.x + Math.cos(Date.now()*0.008)*42;
                    c.y = player.y + Math.sin(Date.now()*0.008)*42;
                }
            }
        }
        
        // ========== BOUCLE ==========
        function gameLoop(now){
            let delta = Math.min(0.033, (now - lastTime)/1000);
            if(delta <= 0.001){ lastTime = now; requestAnimationFrame(gameLoop); return; }
            lastTime = now;
            
            if(gameRunning && !shopOpen){
                updatePlayerMovement(delta);
                updateCombat(delta);
                for(let e of enemies) e.update(delta, player.x, player.y);
                updateParticles(delta);
                updateFloatingTexts(delta);
                spawnWaveLogic(delta);
                updateCompanions(delta);
                if(player.slowEnemies){
                    for(let e of enemies) if(e.speed > 40) e.speed *= (1 - delta * 0.4);
                }
                updateUI();
            }
            draw();
            frame++;
            requestAnimationFrame(gameLoop);
        }
        
        // ========== CONTROLES ==========
        function initControls(){
            window.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                if(k === 'z' || k === 'w') keys.up = true;
                if(k === 's') keys.down = true;
                if(k === 'q' || k === 'a') keys.left = true;
                if(k === 'd') keys.right = true;
                if(k === ' ' && player.dashAvailable && gameRunning && !shopOpen){
                    player.dashAvailable = false;
                    const angle = Math.atan2(mouseY - (player.y - camera.y), mouseX - (player.x - camera.x));
                    player.x += Math.cos(angle) * 170; player.y += Math.sin(angle) * 170;
                    player.invincibilityTimer = 0.35;
                    addParticles(player.x, player.y, '#AAFFFF', 20);
                    setTimeout(() => player.dashAvailable = true, 1100);
                }
                if(k === 'e' && gameRunning){
                    e.preventDefault();
                    if(shopOpen){
                        closeShop();
                    } else {
                        openShop();
                    }
                }
            });
            window.addEventListener('keyup', (e) => {
                const k = e.key.toLowerCase();
                if(k === 'z' || k === 'w') keys.up = false;
                if(k === 's') keys.down = false;
                if(k === 'q' || k === 'a') keys.left = false;
                if(k === 'd') keys.right = false;
            });
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseX = (e.clientX - rect.left) * (canvas.width/rect.width);
                mouseY = (e.clientY - rect.top) * (canvas.height/rect.height);
            });
            canvas.addEventListener('mousedown', (e) => { if(e.button === 0 && !shopOpen) { mouseDown = true; initAudio(); if(audioContext?.state === 'suspended') audioContext.resume(); } });
            window.addEventListener('mouseup', (e) => { if(e.button === 0) mouseDown = false; });
            canvas.addEventListener('click', () => { initAudio(); if(audioContext?.state === 'suspended') audioContext.resume(); });
            document.getElementById('shopBtn').addEventListener('click', openShop);
        }
        
        function start(){
            initControls();
            for(let i=0;i<25;i++) spawnEnemy();
            currentWave = 1;
            waveEnemiesCount = 25;
            document.getElementById('waveCount').innerText = currentWave;
            updateUI();
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
        start();
    })();
</script>
</body>
</html>
