<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamTube — RaGe • Fugu • FUGU TV • Sanjay</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f0f; color: #f1f1f1; font-family: 'Roboto', sans-serif; font-size: 14px; overflow-x: hidden; }
  header {
    position: fixed; top: 0; left: 0; right: 0; height: 56px; background: #0f0f0f;
    display: flex; align-items: center; padding: 0 16px; gap: 16px; z-index: 200;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-toggle { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
  .sidebar-toggle:hover { background: rgba(255,255,255,0.1); }
  .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo-icon { background: #ff0000; color: white; border-radius: 6px; padding: 4px 8px; font-size: 16px; font-weight: 900; }
  .logo-text { font-size: 20px; font-weight: 700; color: #f1f1f1; }
  .logo-text span { color: #ff0000; }
  .search-bar { flex: 1; max-width: 640px; display: flex; margin: 0 auto; }
  .search-bar input {
    flex: 1; height: 40px; background: #0f0f0f; border: 1px solid #3f3f3f; border-right: none;
    border-radius: 40px 0 0 40px; padding: 0 16px; color: #f1f1f1; font-size: 16px; outline: none;
  }
  .search-bar button {
    width: 64px; height: 40px; background: #272727; border: 1px solid #3f3f3f; border-left: none;
    border-radius: 0 40px 40px 0; color: #f1f1f1; font-size: 18px; cursor: pointer;
  }
  .search-bar button:hover { background: #3f3f3f; }
  .header-right { margin-left: auto; display: flex; gap: 8px; }
  .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; position: relative; }
  .icon-btn:hover { background: rgba(255,255,255,0.1); }
  .live-dot { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; background: #ff0000; border-radius: 50%; border: 2px solid #0f0f0f; animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .layout { display: flex; padding-top: 56px; min-height: 100vh; }
  .sidebar {
    position: fixed; top: 56px; left: 0; width: 240px; height: calc(100vh - 56px);
    background: #0f0f0f; overflow-y: auto; padding: 12px 0; border-right: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.2s ease; z-index: 100;
  }
  .sidebar.hidden { transform: translateX(-100%); }
  .sidebar-item {
    display: flex; align-items: center; gap: 24px; padding: 8px 24px; cursor: pointer;
    border-radius: 10px; margin: 0 8px; color: #f1f1f1; text-decoration: none; font-size: 14px;
  }
  .sidebar-item:hover { background: rgba(255,255,255,0.1); }
  .sidebar-item.active { background: rgba(255,255,255,0.12); font-weight: 600; }
  .sidebar-item .icon { font-size: 20px; width: 24px; }
  .sidebar-divider { border: none; border-top: 1px solid #3f3f3f; margin: 12px 0; }
  .sidebar-title { padding: 6px 24px; font-size: 12px; font-weight: 700; color: #aaaaaa; text-transform: uppercase; }
  .creator-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .main { margin-left: 240px; flex: 1; padding: 24px; transition: margin-left 0.2s ease; }
  .main.full { margin-left: 0; }
  .chips-bar {
    display: flex; gap: 12px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px;
    position: sticky; top: 56px; background: #0f0f0f; padding-top: 16px; z-index: 50;
  }
  .chips-bar::-webkit-scrollbar { display: none; }
  .chip {
    padding: 6px 12px; background: #272727; color: #f1f1f1; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .chip:hover { background: #3f3f3f; }
  .chip.active { background: #f1f1f1; color: #0f0f0f; }
  .section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .section-head .avatar { width: 36px; height: 36px; border-radius: 50%; background: #272727; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
  .section-head h2 { font-size: 18px; font-weight: 700; }
  .section-head .sub-count { font-size: 12px; color: #aaaaaa; }
  .section-head a { margin-left: auto; font-size: 13px; color: #aaaaaa; text-decoration: none; padding: 6px 12px; border-radius: 20px; }
  .section-head a:hover { background: rgba(255,255,255,0.1); color: white; }
  .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
  .video-card { cursor: pointer; transition: transform 0.2s; }
  .video-card:hover { transform: translateY(-4px); }
  .thumbnail { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; background: #272727; margin-bottom: 12px; }
  .thumbnail img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
  .video-card:hover .thumbnail img { transform: scale(1.05); }
  .new-badge { position: absolute; top: 8px; left: 8px; background: #ff0000; color: white; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
  .video-info { display: flex; gap: 12px; }
  .channel-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .video-meta { flex: 1; }
  .video-title { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .video-channel { font-size: 13px; color: #aaaaaa; margin-bottom: 4px; }
  .video-stats { font-size: 12px; color: #aaaaaa; }
  .skeleton-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; }
  .skeleton-thumb { width: 100%; aspect-ratio: 16/9; background: linear-gradient(90deg, #272727 25%, #3f3f3f 50%, #272727 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  .skeleton-line { height: 14px; background: linear-gradient(90deg, #272727 25%, #3f3f3f 50%, #272727 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; margin: 8px 12px; border-radius: 4px; }
  .skeleton-line.short { width: 60%; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .error-msg { text-align: center; padding: 60px; color: #aaaaaa; font-size: 16px; }
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #1a1a1a; border-radius: 12px; max-width: 900px; width: 100%; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #3f3f3f; }
  .modal-title { font-size: 16px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .close-btn { background: none; border: none; color: #f1f1f1; font-size: 24px; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; }
  .close-btn:hover { background: rgba(255,255,255,0.1); }
  .modal-player iframe { width: 100%; aspect-ratio: 16/9; border: none; }
  .section-wrap { margin-bottom: 48px; }
  .section-wrap.hidden { display: none; }
  .status-bar { position: fixed; bottom: 20px; right: 20px; background: #272727; padding: 8px 16px; border-radius: 8px; font-size: 12px; z-index: 300; opacity: 0; transition: opacity 0.3s; display: flex; align-items: center; gap: 8px; }
  .status-bar.show { opacity: 1; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: blinkStatus 1.5s infinite; }
  @keyframes blinkStatus { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; padding: 16px; }
    .video-grid { grid-template-columns: 1fr; }
    .search-bar { max-width: 180px; }
    .logo-text { display: none; }
  }
  .overlay-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
  .overlay-bg.show { display: block; }
</style>
</head>
<body>

<header>
  <button class="sidebar-toggle" id="sidebarToggle">☰</button>
  <a class="logo" href="#"><div class="logo-icon">▶</div><span class="logo-text">Stream<span>Tube</span></span></a>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Rechercher une vidéo...">
    <button id="searchBtn">🔍</button>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="refreshBtn">🔄</button>
    <button class="icon-btn">📺<span class="live-dot"></span></button>
  </div>
</header>

<div class="overlay-bg" id="overlayBg" onclick="closeSidebar()"></div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-item active" data-filter="all"><span class="icon">🏠</span> Accueil</div>
    <div class="sidebar-item" data-filter="rage"><span class="icon">🔥</span> RaGe</div>
    <div class="sidebar-item" data-filter="fugu"><span class="icon">🐡</span> Fugu</div>
    <div class="sidebar-item" data-filter="fugutv"><span class="icon">🎭</span> FUGU TV</div>
    <div class="sidebar-item" data-filter="sanjay"><span class="icon">⚡</span> Sanjay</div>
    <hr class="sidebar-divider">
    <div class="sidebar-title">Filtres</div>
    <div class="sidebar-item" data-filter="valorant"><span class="icon">🎮</span> Valorant</div>
    <hr class="sidebar-divider">
    <div class="sidebar-title">Chaînes officielles</div>
    <a class="sidebar-item" href="https://www.youtube.com/@RaGe1030" target="_blank"><div class="creator-avatar" style="background:#ff4500">R</div> RaGe</a>
    <a class="sidebar-item" href="https://www.youtube.com/@Fugufugu" target="_blank"><div class="creator-avatar" style="background:#00b4d8">F</div> Fugu</a>
    <a class="sidebar-item" href="https://www.youtube.com/@FUGUTV" target="_blank"><div class="creator-avatar" style="background:#0077b6">F2</div> FUGU TV</a>
    <a class="sidebar-item" href="https://www.youtube.com/@sanjayttv" target="_blank"><div class="creator-avatar" style="background:#7b2d8b">S</div> Sanjay</a>
  </div>

  <div class="main" id="main">
    <div class="chips-bar" id="chipsBar">
      <button class="chip active" data-filter="all">Tout</button>
      <button class="chip" data-filter="rage">🔥 RaGe</button>
      <button class="chip" data-filter="fugu">🐡 Fugu</button>
      <button class="chip" data-filter="fugutv">🎭 FUGU TV</button>
      <button class="chip" data-filter="sanjay">⚡ Sanjay</button>
      <button class="chip" data-filter="valorant">🎮 Valorant</button>
    </div>

    <div id="section-all" class="section-wrap">
      <div class="section-head">
        <div class="avatar" style="background:#ff0000;color:white;font-size:18px;">▶</div>
        <div><h2>Dernières vidéos Valorant</h2><div class="sub-count" id="lastUpdated">Chargement...</div></div>
        <a href="#" onclick="refreshAll(); return false;">⟳ Actualiser</a>
      </div>
      <div class="video-grid" id="grid-all"></div>
    </div>

    <div id="section-search" class="section-wrap hidden">
      <div class="section-head">
        <div class="avatar" style="background:#444;">🔍</div>
        <div><h2>Résultats de recherche</h2><div class="sub-count" id="searchCount"></div></div>
        <a href="#" onclick="showAll(); return false;">← Retour</a>
      </div>
      <div class="video-grid" id="grid-search"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="playerModal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header"><div class="modal-title" id="modalTitle"></div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-player"><iframe id="playerIframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
  </div>
</div>

<div class="status-bar" id="statusBar"><div class="status-dot"></div><span id="statusText">Chargement...</span></div>

<script>
const YOUTUBE_API_KEY = "AIzaSyD4CMjb1oBipQukjZAmtVGYvCP25jDD-rU";

// UNIQUEMENT 4 CHAÎNES - PAS DE BILLY
const CHANNELS = [
  { id: "UCK3IMTqQlxjmUUdEV8t7d8Q", name: "RaGe", color: "#ff4500", letter: "R", tags: ["valorant"] },
  { id: "UCQyaIMXW9GNiKoC93EwCFgA", name: "Fugu", color: "#00b4d8", letter: "F", tags: ["valorant"] },
  { id: "UCrMCH7OlCkqJLMJ1A4X6rvQ", name: "FUGU TV", color: "#0077b6", letter: "F2", tags: ["valorant"] },
  { id: "UCOg4E0BWexHE1e-IlNNYMzg", name: "Sanjay", color: "#7b2d8b", letter: "S", tags: ["valorant"] }
];

let allVideos = [];
let currentFilter = "all";
let currentSearchQuery = "";
let isLoading = false;

async function fetchChannelVideos(channel) {
  const url = `https://www.googleapis.com/youtube/v3/search?key=${YOUTUBE_API_KEY}&channelId=${channel.id}&part=snippet&order=date&maxResults=15&type=video`;
  try {
    const response = await fetch(url);
    const data = await response.json();
    if (data.error) return [];
    if (!data.items) return [];
    return data.items.map(item => ({
      id: item.id.videoId,
      title: item.snippet.title,
      published: new Date(item.snippet.publishedAt),
      thumbnail: item.snippet.thumbnails.medium?.url || `https://i.ytimg.com/vi/${item.id.videoId}/mqdefault.jpg`,
      channelId: channel.id,
      channelName: channel.name,
      channelColor: channel.color,
      channelLetter: channel.letter,
      tags: channel.tags
    }));
  } catch (error) {
    return [];
  }
}

async function loadAllVideos() {
  if (isLoading) return;
  isLoading = true;
  showStatus("Chargement des vidéos Valorant...", 0);
  allVideos = [];
  const promises = CHANNELS.map(channel => fetchChannelVideos(channel));
  const results = await Promise.all(promises);
  for (let i = 0; i < results.length; i++) allVideos.push(...results[i]);
  allVideos.sort((a, b) => b.published - a.published);
  renderCurrentView();
  updateTimestamp();
  showStatus(`✓ ${allVideos.length} vidéos Valorant chargées`, 3000);
  isLoading = false;
}

function renderCurrentView() {
  if (currentSearchQuery) {
    const results = allVideos.filter(v => v.title.toLowerCase().includes(currentSearchQuery.toLowerCase()) || v.channelName.toLowerCase().includes(currentSearchQuery.toLowerCase()));
    renderGrid("grid-search", results);
    document.getElementById("searchCount").textContent = `${results.length} résultat${results.length > 1 ? 's' : ''}`;
    return;
  }
  let filteredVideos = [...allVideos];
  if (currentFilter === "valorant") {
    filteredVideos = allVideos.filter(v => v.tags && v.tags.includes("valorant"));
    updateSectionTitle("🎮 Valorant");
  } else if (currentFilter !== "all") {
    const channelMap = { "rage": "UCK3IMTqQlxjmUUdEV8t7d8Q", "fugu": "UCQyaIMXW9GNiKoC93EwCFgA", "fugutv": "UCrMCH7OlCkqJLMJ1A4X6rvQ", "sanjay": "UCOg4E0BWexHE1e-IlNNYMzg" };
    filteredVideos = allVideos.filter(v => v.channelId === channelMap[currentFilter]);
    const channel = CHANNELS.find(c => c.id === channelMap[currentFilter]);
    if (channel) updateSectionTitle(channel.name);
  } else {
    updateSectionTitle("Dernières vidéos Valorant");
  }
  renderGrid("grid-all", filteredVideos.slice(0, 40));
}

function updateSectionTitle(title) {
  const head = document.querySelector("#section-all .section-head h2");
  if (head) head.textContent = title;
}

function renderGrid(gridId, videos) {
  const grid = document.getElementById(gridId);
  if (!grid) return;
  if (videos.length === 0) { grid.innerHTML = `<div class="error-msg">😅 Aucune vidéo trouvée</div>`; return; }
  grid.innerHTML = videos.map(v => `<div class="video-card" onclick="playVideo('${v.id}', '${escapeHtml(v.title)}')">
    <div class="thumbnail"><img src="${v.thumbnail}" alt="${escapeHtml(v.title)}" loading="lazy" onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
    ${(Date.now() - v.published.getTime()) < 259200000 ? '<div class="new-badge">NOUVEAU</div>' : ''}</div>
    <div class="video-info"><div class="channel-icon" style="background:${v.channelColor};color:white">${v.channelLetter}</div>
    <div class="video-meta"><div class="video-title">${escapeHtml(v.title)}</div>
    <div class="video-channel">${v.channelName}</div>
    <div class="video-stats">${formatTimeAgo(v.published)}</div></div></div></div>`).join("");
}

function formatTimeAgo(date) {
  const diff = Date.now() - date.getTime();
  const mins = Math.floor(diff/60000), hours = Math.floor(diff/3600000), days = Math.floor(diff/86400000);
  if (mins < 60) return `il y a ${mins} min`;
  if (hours < 24) return `il y a ${hours} h`;
  if (days < 7) return `il y a ${days} j`;
  return `le ${date.getDate()}/${date.getMonth()+1}`;
}

function escapeHtml(str) { return (str || '').replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }

function showAll() {
  currentFilter = "all"; currentSearchQuery = "";
  document.getElementById("searchInput").value = "";
  document.getElementById("section-all").classList.remove("hidden");
  document.getElementById("section-search").classList.add("hidden");
  document.querySelectorAll(".sidebar-item, .chip").forEach(el => { el.classList.remove("active"); if (el.dataset.filter === "all") el.classList.add("active"); });
  renderCurrentView();
}

function setFilter(filter) {
  currentFilter = filter; currentSearchQuery = "";
  document.getElementById("searchInput").value = "";
  document.getElementById("section-all").classList.remove("hidden");
  document.getElementById("section-search").classList.add("hidden");
  document.querySelectorAll(".sidebar-item, .chip").forEach(el => { el.classList.remove("active"); if (el.dataset.filter === filter) el.classList.add("active"); });
  renderCurrentView();
}

function searchVideos() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) { showAll(); return; }
  currentSearchQuery = query;
  document.getElementById("section-all").classList.add("hidden");
  document.getElementById("section-search").classList.remove("hidden");
  const results = allVideos.filter(v => v.title.toLowerCase().includes(query.toLowerCase()) || v.channelName.toLowerCase().includes(query.toLowerCase()));
  renderGrid("grid-search", results);
  document.getElementById("searchCount").textContent = `${results.length} résultat${results.length > 1 ? 's' : ''}`;
}

function playVideo(videoId, title) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("playerIframe").src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
  document.getElementById("playerModal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) { if (e && e.target !== document.getElementById("playerModal") && e.type === "click") return;
  document.getElementById("playerIframe").src = "";
  document.getElementById("playerModal").classList.remove("open");
  document.body.style.overflow = "";
}
function refreshAll() { loadAllVideos(); }
function showStatus(text, hideAfter = 2000) {
  const bar = document.getElementById("statusBar");
  document.getElementById("statusText").textContent = text;
  bar.classList.add("show");
  if (hideAfter > 0) setTimeout(() => bar.classList.remove("show"), hideAfter);
}
function updateTimestamp() {
  const el = document.getElementById("lastUpdated");
  if (el && allVideos.length > 0) { const now = new Date(); el.textContent = `${allVideos.length} vidéos • ${now.getHours()}h${String(now.getMinutes()).padStart(2,'0')}`; }
}
function closeSidebar() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlayBg").classList.remove("show"); }

document.getElementById("sidebarToggle").addEventListener("click", () => {
  const sidebar = document.getElementById("sidebar"), overlay = document.getElementById("overlayBg");
  if (window.innerWidth <= 768) { sidebar.classList.toggle("open"); overlay.classList.toggle("show"); }
  else { sidebar.classList.toggle("hidden"); document.getElementById("main").classList.toggle("full"); }
});
document.getElementById("searchBtn").addEventListener("click", searchVideos);
document.getElementById("searchInput").addEventListener("keypress", (e) => { if (e.key === "Enter") searchVideos(); });
document.getElementById("refreshBtn").addEventListener("click", refreshAll);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
document.querySelectorAll(".sidebar-item, .chip").forEach(el => { if (el.dataset && el.dataset.filter) el.addEventListener("click", () => setFilter(el.dataset.filter)); });

loadAllVideos();
setInterval(refreshAll, 10 * 60 * 1000);
</script>
</body>
</html>
