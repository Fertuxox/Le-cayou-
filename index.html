<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamTube — RaGe • Fugu • Sanjay • Billy</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0f0f0f;
    color: #f1f1f1;
    font-family: 'Roboto', sans-serif;
    font-size: 14px;
    overflow-x: hidden;
  }

  /* Header */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: #0f0f0f;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    z-index: 200;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }

  .logo-icon {
    background: #ff0000;
    color: white;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 16px;
    font-weight: 900;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 700;
    color: #f1f1f1;
  }

  .logo-text span { color: #ff0000; }

  /* Search Bar */
  .search-bar {
    flex: 1;
    max-width: 640px;
    display: flex;
    margin: 0 auto;
  }

  .search-bar input {
    flex: 1;
    height: 40px;
    background: #0f0f0f;
    border: 1px solid #3f3f3f;
    border-right: none;
    border-radius: 40px 0 0 40px;
    padding: 0 16px;
    color: #f1f1f1;
    font-size: 16px;
    outline: none;
  }

  .search-bar button {
    width: 64px;
    height: 40px;
    background: #272727;
    border: 1px solid #3f3f3f;
    border-left: none;
    border-radius: 0 40px 40px 0;
    color: #f1f1f1;
    font-size: 18px;
    cursor: pointer;
  }

  .search-bar button:hover { background: #3f3f3f; }

  /* Layout */
  .layout {
    display: flex;
    padding-top: 56px;
  }

  /* Sidebar */
  .sidebar {
    position: fixed;
    top: 56px;
    left: 0;
    width: 240px;
    height: calc(100vh - 56px);
    background: #0f0f0f;
    overflow-y: auto;
    padding: 12px 0;
    border-right: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.2s ease;
  }

  .sidebar.hidden { transform: translateX(-100%); }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 8px 24px;
    cursor: pointer;
    border-radius: 10px;
    margin: 0 8px;
    color: #f1f1f1;
    text-decoration: none;
    font-size: 14px;
  }

  .sidebar-item:hover { background: rgba(255,255,255,0.1); }
  .sidebar-item.active { background: rgba(255,255,255,0.12); font-weight: 600; }

  .sidebar-item .icon { font-size: 20px; width: 24px; }

  .sidebar-divider {
    border: none;
    border-top: 1px solid #3f3f3f;
    margin: 12px 0;
  }

  .sidebar-title {
    padding: 6px 24px;
    font-size: 12px;
    font-weight: 700;
    color: #aaaaaa;
    text-transform: uppercase;
  }

  .creator-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }

  /* Main Content */
  .main {
    margin-left: 240px;
    flex: 1;
    padding: 24px;
    transition: margin-left 0.2s ease;
  }

  .main.full { margin-left: 0; }

  /* Chips */
  .chips-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    overflow-x: auto;
    padding-bottom: 8px;
    position: sticky;
    top: 56px;
    background: #0f0f0f;
    padding-top: 16px;
    z-index: 50;
  }

  .chips-bar::-webkit-scrollbar { display: none; }

  .chip {
    padding: 6px 12px;
    background: #272727;
    color: #f1f1f1;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }

  .chip:hover { background: #3f3f3f; }
  .chip.active { background: #f1f1f1; color: #0f0f0f; }

  /* Video Grid */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }

  .video-card {
    cursor: pointer;
    transition: transform 0.2s;
  }

  .video-card:hover { transform: scale(1.02); }

  .thumbnail {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 12px;
    overflow: hidden;
    background: #272727;
    margin-bottom: 12px;
  }

  .thumbnail img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .duration {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.8);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
  }

  .video-info {
    display: flex;
    gap: 12px;
  }

  .channel-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
  }

  .video-details {
    flex: 1;
  }

  .video-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .channel-name {
    font-size: 13px;
    color: #aaaaaa;
    margin-bottom: 4px;
  }

  .video-views {
    font-size: 12px;
    color: #aaaaaa;
  }

  .new-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: #ff0000;
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    color: #aaaaaa;
  }

  .error {
    text-align: center;
    padding: 40px;
    color: #ff0000;
  }

  /* Modal */
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal.open { display: flex; }

  .modal-content {
    background: #1a1a1a;
    border-radius: 12px;
    max-width: 900px;
    width: 100%;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid #3f3f3f;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 600;
  }

  .close-btn {
    background: none;
    border: none;
    color: #f1f1f1;
    font-size: 24px;
    cursor: pointer;
  }

  .modal-body iframe {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
  }

  /* Status */
  .status-bar {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #272727;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .status-bar.show { opacity: 1; }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .video-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <button class="sidebar-toggle" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;width:40px;height:40px;">☰</button>
  <a class="logo" href="#">
    <div class="logo-icon">▶</div>
    <span class="logo-text">Stream<span>Tube</span></span>
  </a>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Rechercher une vidéo...">
    <button id="searchBtn">🔍</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-item active" data-filter="all">
      <span class="icon">🏠</span> Accueil
    </div>
    <div class="sidebar-item" data-filter="rage">
      <span class="icon">🔥</span> RaGe
    </div>
    <div class="sidebar-item" data-filter="fugu">
      <span class="icon">🐡</span> Fugu
    </div>
    <div class="sidebar-item" data-filter="fugutv">
      <span class="icon">🎭</span> FUGU TV
    </div>
    <div class="sidebar-item" data-filter="sanjay">
      <span class="icon">⚡</span> Sanjay
    </div>
    <div class="sidebar-item" data-filter="billy">
      <span class="icon">😂</span> Billy
    </div>

    <hr class="sidebar-divider">

    <div class="sidebar-title">Filtres</div>
    <div class="sidebar-item" data-filter="valorant">
      <span class="icon">🎮</span> Valorant
    </div>
    <div class="sidebar-item" data-filter="react">
      <span class="icon">😂</span> React
    </div>
  </div>

  <div class="main" id="main">
    <div class="chips-bar" id="chipsBar">
      <button class="chip active" data-filter="all">Tout</button>
      <button class="chip" data-filter="rage">🔥 RaGe</button>
      <button class="chip" data-filter="fugu">🐡 Fugu</button>
      <button class="chip" data-filter="fugutv">🎭 FUGU TV</button>
      <button class="chip" data-filter="sanjay">⚡ Sanjay</button>
      <button class="chip" data-filter="billy">😂 Billy</button>
      <button class="chip" data-filter="valorant">🎮 Valorant</button>
      <button class="chip" data-filter="react">😂 React</button>
    </div>
    <div class="video-grid" id="videoGrid"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="close-btn" id="closeModal">✕</button>
    </div>
    <div class="modal-body">
      <iframe id="videoPlayer" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar">Chargement...</div>

<script>
// Configuration des chaînes YouTube avec URLs RSS
const CHANNELS = {
  rage: {
    name: "RaGe",
    url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCK3IMTqQlxjmUUdEV8t7d8Q",
    color: "#ff4500",
    letter: "R",
    tags: ["valorant"]
  },
  fugu: {
    name: "Fugu",
    url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCQyaIMXW9GNiKoC93EwCFgA",
    color: "#00b4d8",
    letter: "F",
    tags: ["valorant"]
  },
  fugutv: {
    name: "FUGU TV",
    url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCrMCH7OlCkqJLMJ1A4X6rvQ",
    color: "#0077b6",
    letter: "F2",
    tags: ["valorant", "react"]
  },
  sanjay: {
    name: "Sanjay",
    url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCOg4E0BWexHE1e-IlNNYMzg",
    color: "#7b2d8b",
    letter: "S",
    tags: ["valorant"]
  },
  billy: {
    name: "Billy (RebeuDeter)",
    url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCWDyxFXoK_nPWfaw6f_sspw",
    color: "#d62828",
    letter: "B",
    tags: ["react"]
  }
};

let allVideos = [];
let currentFilter = "all";

// Fonction pour parser le flux RSS
async function fetchRSS(channelKey, channelData) {
  try {
    // Utiliser un proxy CORS gratuit
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(channelData.url)}`;
    const response = await fetch(proxyUrl);
    const text = await response.text();
    
    // Parser le XML
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");
    const entries = xml.querySelectorAll("entry");
    
    const videos = [];
    for (let i = 0; i < Math.min(entries.length, 10); i++) {
      const entry = entries[i];
      const title = entry.querySelector("title")?.textContent || "Sans titre";
      const link = entry.querySelector("link")?.getAttribute("href") || "";
      const videoId = link.split("v=")[1]?.split("&")[0] || "";
      const published = new Date(entry.querySelector("published")?.textContent || new Date());
      const thumbnail = `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`;
      
      if (videoId) {
        videos.push({
          id: videoId,
          title: title,
          link: link,
          published: published,
          thumbnail: thumbnail,
          channelKey: channelKey,
          channelName: channelData.name,
          channelColor: channelData.color,
          channelLetter: channelData.letter,
          tags: channelData.tags
        });
      }
    }
    
    return videos;
  } catch (error) {
    console.error(`Erreur pour ${channelData.name}:`, error);
    return [];
  }
}

// Charger toutes les vidéos
async function loadAllVideos() {
  showStatus("Chargement des vidéos...");
  
  const videoPromises = [];
  for (const [key, data] of Object.entries(CHANNELS)) {
    videoPromises.push(fetchRSS(key, data));
  }
  
  const results = await Promise.all(videoPromises);
  allVideos = results.flat();
  
  // Trier par date (plus récent en premier)
  allVideos.sort((a, b) => b.published - a.published);
  
  showStatus(`${allVideos.length} vidéos chargées !`);
  renderVideos();
}

// Rendre les vidéos
function renderVideos() {
  const grid = document.getElementById("videoGrid");
  let filteredVideos = [...allVideos];
  
  // Appliquer le filtre
  if (currentFilter !== "all") {
    if (currentFilter === "valorant") {
      filteredVideos = allVideos.filter(v => v.tags.includes("valorant"));
    } else if (currentFilter === "react") {
      filteredVideos = allVideos.filter(v => v.tags.includes("react"));
    } else {
      filteredVideos = allVideos.filter(v => v.channelKey === currentFilter);
    }
  }
  
  if (filteredVideos.length === 0) {
    grid.innerHTML = '<div class="loading">Aucune vidéo trouvée 😢</div>';
    return;
  }
  
  grid.innerHTML = filteredVideos.map(video => `
    <div class="video-card" onclick="playVideo('${video.id}', '${escapeHtml(video.title)}')">
      <div class="thumbnail">
        <img src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy">
        ${isNew(video.published) ? '<div class="new-badge">NOUVEAU</div>' : ''}
      </div>
      <div class="video-info">
        <div class="channel-avatar" style="background:${video.channelColor}">${video.channelLetter}</div>
        <div class="video-details">
          <div class="video-title">${escapeHtml(video.title)}</div>
          <div class="channel-name">${video.channelName}</div>
          <div class="video-views">${formatDate(video.published)}</div>
        </div>
      </div>
    </div>
  `).join("");
}

// Vérifier si la vidéo est récente (moins de 7 jours)
function isNew(date) {
  const diff = Date.now() - date.getTime();
  return diff < 7 * 24 * 60 * 60 * 1000;
}

// Formater la date
function formatDate(date) {
  const diff = Date.now() - date.getTime();
  const days = Math.floor(diff / (24 * 60 * 60 * 1000));
  const hours = Math.floor(diff / (60 * 60 * 1000));
  const minutes = Math.floor(diff / (60 * 1000));
  
  if (minutes < 60) return `il y a ${minutes} min`;
  if (hours < 24) return `il y a ${hours} h`;
  if (days < 7) return `il y a ${days} j`;
  return `le ${date.getDate()}/${date.getMonth() + 1}`;
}

// Rechercher des vidéos
function searchVideos() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  if (!query) {
    renderVideos();
    return;
  }
  
  const filtered = allVideos.filter(v => 
    v.title.toLowerCase().includes(query) || 
    v.channelName.toLowerCase().includes(query)
  );
  
  const grid = document.getElementById("videoGrid");
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="loading">Aucun résultat pour "' + escapeHtml(query) + '"</div>';
  } else {
    grid.innerHTML = filtered.map(video => `
      <div class="video-card" onclick="playVideo('${video.id}', '${escapeHtml(video.title)}')">
        <div class="thumbnail">
          <img src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy">
        </div>
        <div class="video-info">
          <div class="channel-avatar" style="background:${video.channelColor}">${video.channelLetter}</div>
          <div class="video-details">
            <div class="video-title">${escapeHtml(video.title)}</div>
            <div class="channel-name">${video.channelName}</div>
          </div>
        </div>
      </div>
    `).join("");
  }
}

// Jouer une vidéo
function playVideo(videoId, title) {
  const modal = document.getElementById("modal");
  const player = document.getElementById("videoPlayer");
  document.getElementById("modalTitle").textContent = title;
  player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  modal.classList.add("open");
}

// Fermer le modal
function closeModal() {
  const modal = document.getElementById("modal");
  const player = document.getElementById("videoPlayer");
  modal.classList.remove("open");
  player.src = "";
}

// Afficher le statut
function showStatus(message) {
  const bar = document.getElementById("statusBar");
  bar.textContent = message;
  bar.classList.add("show");
  setTimeout(() => bar.classList.remove("show"), 3000);
}

// Échapper le HTML
function escapeHtml(str) {
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// Gérer les filtres
function setFilter(filter) {
  currentFilter = filter;
  
  // Mettre à jour les classes actives
  document.querySelectorAll(".sidebar-item, .chip").forEach(el => {
    if (el.dataset.filter === filter) {
      el.classList.add("active");
    } else {
      el.classList.remove("active");
    }
  });
  
  renderVideos();
}

// Événements
document.querySelectorAll(".sidebar-item").forEach(item => {
  item.addEventListener("click", () => {
    setFilter(item.dataset.filter);
    if (window.innerWidth <= 768) {
      document.getElementById("sidebar").classList.remove("open");
    }
  });
});

document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    setFilter(chip.dataset.filter);
  });
});

document.querySelector(".sidebar-toggle").addEventListener("click", () => {
  document.getElementById("sidebar").classList.toggle("open");
});

document.getElementById("searchBtn").addEventListener("click", searchVideos);
document.getElementById("searchInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") searchVideos();
});

document.getElementById("closeModal").addEventListener("click", closeModal);
document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target === document.getElementById("modal")) closeModal();
});

// Démarrer l'application
loadAllVideos();
</script>
</body>
</html>
