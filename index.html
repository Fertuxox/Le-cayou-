<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamTube — RaGe • Fugu • Sanjay • Billy</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #272727;
    --bg4: #3f3f3f;
    --text: #f1f1f1;
    --muted: #aaaaaa;
    --border: #3f3f3f;
    --red: #ff0000;
    --sidebar-w: 240px;
    --header-h: 56px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto', sans-serif;
    font-size: 14px;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--bg);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    z-index: 200;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .hamburger {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    font-size: 18px;
    flex-shrink: 0;
  }
  .hamburger:hover { background: rgba(255,255,255,0.1); }

  .logo {
    display: flex;
    align-items: center;
    gap: 4px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .logo-icon {
    background: var(--red);
    color: white;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: -1px;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--red); }

  .search-bar {
    flex: 1;
    max-width: 640px;
    display: flex;
    margin: 0 auto;
  }

  .search-bar input {
    flex: 1;
    height: 40px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 40px 0 0 40px;
    padding: 0 16px;
    color: var(--text);
    font-size: 16px;
    outline: none;
  }
  .search-bar input:focus { border-color: #1c62b9; }
  .search-bar input::placeholder { color: var(--muted); }

  .search-btn {
    width: 64px; height: 40px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-left: none;
    border-radius: 0 40px 40px 0;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
  }
  .search-btn:hover { background: var(--bg4); }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    font-size: 20px;
    position: relative;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.1); }

  .live-dot {
    position: absolute;
    top: 6px; right: 6px;
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    border: 2px solid var(--bg);
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .layout {
    display: flex;
    padding-top: var(--header-h);
    min-height: 100vh;
  }

  sidebar {
    position: fixed;
    top: var(--header-h);
    left: 0;
    width: var(--sidebar-w);
    height: calc(100vh - var(--header-h));
    background: var(--bg);
    overflow-y: auto;
    padding: 12px 0;
    z-index: 100;
    transition: transform 0.2s ease;
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  sidebar.hidden { transform: translateX(-100%); }

  .sidebar-section { margin-bottom: 4px; }

  .sidebar-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 12px 0;
  }

  .sidebar-title {
    padding: 6px 24px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 8px 24px;
    cursor: pointer;
    border-radius: 10px;
    margin: 0 8px;
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
  }
  .sidebar-item:hover { background: rgba(255,255,255,0.1); }
  .sidebar-item.active { background: rgba(255,255,255,0.12); font-weight: 600; }

  .sidebar-item .icon { font-size: 20px; width: 24px; text-align: center; }

  .creator-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }

  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 24px 24px 60px;
    transition: margin-left 0.2s ease;
    min-width: 0;
  }

  .main.full { margin-left: 0; }

  .chips-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    overflow-x: auto;
    padding-bottom: 4px;
    position: sticky;
    top: var(--header-h);
    background: var(--bg);
    padding-top: 16px;
    z-index: 50;
  }
  .chips-bar::-webkit-scrollbar { display: none; }

  .chip {
    padding: 6px 12px;
    background: var(--bg3);
    color: var(--text);
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .chip:hover { background: var(--bg4); }
  .chip.active { background: var(--text); color: var(--bg); }

  .section-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    margin-top: 8px;
  }

  .section-head .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
  }

  .section-head h2 { font-size: 16px; font-weight: 700; color: var(--text); }
  .section-head .sub-count { font-size: 12px; color: var(--muted); }
  .section-head a {
    margin-left: auto;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 20px;
  }
  .section-head a:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .video-card {
    cursor: pointer;
    border-radius: 12px;
    overflow: hidden;
    background: transparent;
  }

  .thumb-wrap {
    position: relative;
    aspect-ratio: 16/9;
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg3);
    margin-bottom: 12px;
  }

  .thumb-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }
  .video-card:hover .thumb-wrap img { transform: scale(1.03); }

  .thumb-placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }

  .duration {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .video-info { display: flex; gap: 12px; }

  .channel-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    margin-top: 2px;
  }

  .video-meta { flex: 1; min-width: 0; }

  .video-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .video-channel {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .video-card:hover .video-channel { color: var(--text); }

  .video-stats { font-size: 13px; color: var(--muted); }

  .new-badge {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--red);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .skeleton {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skel-thumb { aspect-ratio: 16/9; border-radius: 12px; margin-bottom: 12px; }
  .skel-line { height: 14px; margin-bottom: 8px; }
  .skel-short { width: 60%; height: 13px; }

  .error-msg {
    padding: 20px;
    background: rgba(255,0,0,0.1);
    border: 1px solid rgba(255,0,0,0.2);
    border-radius: 10px;
    text-align: center;
    margin-bottom: 20px;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal-box {
    background: var(--bg2);
    border-radius: 12px;
    overflow: hidden;
    width: 100%;
    max-width: 900px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .close-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 20px;
  }
  .close-btn:hover { background: rgba(255,255,255,0.12); }

  .modal-player iframe {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
  }

  .section-wrap { margin-bottom: 48px; }
  .section-wrap.hidden { display: none; }

  .status-bar {
    position: fixed;
    bottom: 16px; right: 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--muted);
    z-index: 300;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s ease;
  }

  .status-bar.show { opacity: 1; transform: translateY(0); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: blink 1.5s infinite; }

  @media (max-width: 768px) {
    sidebar { transform: translateX(-100%); }
    sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; padding: 16px; }
    .video-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .search-bar { max-width: 250px; }
    .logo-text { display: none; }
  }

  .overlay-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
  }
  .overlay-bg.show { display: block; }
</style>
</head>

<script>
// TA CLÉ API - À GARDER SECRÈTE !
const YOUTUBE_API_KEY = "AIzaSyD4CMjb1oBipQukjZAmtVGYvCP25jDD-rU";

// Configuration des chaînes
const CHANNELS = [
  { id: "UCK3IMTqQlxjmUUdEV8t7d8Q", name: "RaGe", color: "#ff4500", letter: "R", tags: ["valorant"] },
  { id: "UCQyaIMXW9GNiKoC93EwCFgA", name: "Fugu", color: "#00b4d8", letter: "F", tags: ["valorant"] },
  { id: "UCrMCH7OlCkqJLMJ1A4X6rvQ", name: "FUGU TV", color: "#0077b6", letter: "F2", tags: ["valorant", "react"] },
  { id: "UCOg4E0BWexHE1e-IlNNYMzg", name: "Sanjay", color: "#7b2d8b", letter: "S", tags: ["valorant"] },
  { id: "UCWDyxFXoK_nPWfaw6f_sspw", name: "Billy (RebeuDeter)", color: "#d62828", letter: "B", tags: ["react"] }
];

let allVideos = [];
let currentFilter = 'all';

// Récupérer les vidéos d'une chaîne
async function getChannelVideos(channelId, channelName, channelColor, channelLetter, tags) {
  const url = `https://www.googleapis.com/youtube/v3/search?key=${YOUTUBE_API_KEY}&channelId=${channelId}&part=snippet&order=date&maxResults=15&type=video`;
  
  try {
    const response = await fetch(url);
    const data = await response.json();
    
    if (data.error) {
      console.error(`Erreur pour ${channelName}:`, data.error);
      return [];
    }
    
    if (!data.items) return [];
    
    return data.items.map(item => ({
      id: item.id.videoId,
      title: item.snippet.title,
      published: new Date(item.snippet.publishedAt),
      thumbnail: item.snippet.thumbnails.medium.url,
      channelId: channelId,
      channelName: channelName,
      channelColor: channelColor,
      channelLetter: channelLetter,
      tags: tags
    }));
  } catch (error) {
    console.error(`Erreur pour ${channelName}:`, error);
    return [];
  }
}

// Charger toutes les vidéos
async function loadAllVideos() {
  showStatus("Chargement des vidéos...", 0);
  
  allVideos = [];
  
  for (const channel of CHANNELS) {
    const videos = await getChannelVideos(channel.id, channel.name, channel.color, channel.letter, channel.tags);
    allVideos.push(...videos);
  }
  
  // Trier par date
  allVideos.sort((a, b) => b.published - a.published);
  
  renderCurrentView();
  updateTimestamp();
  showStatus(`✓ ${allVideos.length} vidéos chargées`, 3000);
}

function renderCurrentView() {
  if (currentFilter === 'all') {
    renderGrid('grid-all', allVideos.slice(0, 40));
  } else if (currentFilter === 'valorant') {
    const vids = allVideos.filter(v => v.tags && v.tags.includes('valorant'));
    renderGrid('grid-all', vids);
    const head = document.querySelector('#section-all .section-head h2');
    if (head) head.textContent = '🎮 Valorant';
  } else if (currentFilter === 'react') {
    const vids = allVideos.filter(v => v.tags && v.tags.includes('react'));
    renderGrid('grid-all', vids);
    const head = document.querySelector('#section-all .section-head h2');
    if (head) head.textContent = '😂 React / Réactions';
  } else {
    const vids = allVideos.filter(v => v.channelId === currentFilter);
    renderGrid('grid-all', vids);
  }
}

function renderGrid(gridId, videos) {
  const grid = document.getElementById(gridId);
  if (!grid) return;
  
  if (videos.length === 0) {
    grid.innerHTML = `<div class="error-msg">😅 Aucune vidéo trouvée pour ce filtre.</div>`;
    return;
  }
  
  grid.innerHTML = videos.map(v => createVideoCard(v)).join('');
}

function createVideoCard(v) {
  const isNew = (Date.now() - v.published.getTime()) < 86400000 * 3;
  const timeAgo = formatTimeAgo(v.published);
  
  return `
    <div class="video-card" onclick="openVideo('${v.id}', '${escapeHtml(v.title)}')">
      <div class="thumb-wrap">
        <img src="${v.thumbnail}" alt="${escapeHtml(v.title)}" loading="lazy">
        ${isNew ? `<div class="new-badge">Nouveau</div>` : ''}
      </div>
      <div class="video-info">
        <div class="channel-icon" style="background:${v.channelColor};color:white">${v.channelLetter}</div>
        <div class="video-meta">
          <div class="video-title">${escapeHtml(v.title)}</div>
          <div class="video-channel">${v.channelName}</div>
          <div class="video-stats">${timeAgo}</div>
        </div>
      </div>
    </div>
  `;
}

function escapeHtml(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatTimeAgo(date) {
  const diff = Date.now() - date.getTime();
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  const weeks = Math.floor(days / 7);
  
  if (mins < 60) return `il y a ${mins} minute${mins > 1 ? 's' : ''}`;
  if (hours < 24) return `il y a ${hours} heure${hours > 1 ? 's' : ''}`;
  if (days < 7) return `il y a ${days} jour${days > 1 ? 's' : ''}`;
  if (weeks < 5) return `il y a ${weeks} semaine${weeks > 1 ? 's' : ''}`;
  return `il y a ${Math.floor(days/30)} mois`;
}

function showAll() {
  currentFilter = 'all';
  document.getElementById('section-all').classList.remove('hidden');
  document.getElementById('section-search').classList.add('hidden');
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  document.querySelector('.sidebar-item').classList.add('active');
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.chip').classList.add('active');
  const head = document.querySelector('#section-all .section-head h2');
  if (head) head.textContent = 'Dernières vidéos';
  renderGrid('grid-all', allVideos.slice(0, 40));
}

function filterByCreator(channelId) {
  currentFilter = channelId;
  document.getElementById('section-all').classList.remove('hidden');
  document.getElementById('section-search').classList.add('hidden');
  const vids = allVideos.filter(v => v.channelId === channelId);
  const channel = CHANNELS.find(c => c.id === channelId);
  const head = document.querySelector('#section-all .section-head h2');
  if (head && channel) head.textContent = channel.name;
  renderGrid('grid-all', vids);
}

function filterByTag(tag) {
  currentFilter = tag;
  document.getElementById('section-all').classList.remove('hidden');
  document.getElementById('section-search').classList.add('hidden');
  const vids = allVideos.filter(v => v.tags && v.tags.includes(tag));
  const head = document.querySelector('#section-all .section-head h2');
  if (head) head.textContent = tag === 'valorant' ? '🎮 Valorant' : '😂 React / Réactions';
  renderGrid('grid-all', vids);
}

function setChip(btn, filter) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  
  if (filter === 'all') showAll();
  else if (filter === 'valorant' || filter === 'react') filterByTag(filter);
  else filterByCreator(filter);
}

function filterVideos() {
  const query = document.getElementById('searchInput').value;
  if (!query || !query.trim()) {
    showAll();
    return;
  }
  const q = query.toLowerCase().trim();
  document.getElementById('section-search').classList.remove('hidden');
  document.getElementById('section-all').classList.add('hidden');
  const results = allVideos.filter(v => v.title.toLowerCase().includes(q) || v.channelName.toLowerCase().includes(q));
  renderGrid('grid-search', results);
}

function openVideo(videoId, title) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('playerIframe').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
  document.getElementById('playerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('playerModal') && e.type === 'click') return;
  document.getElementById('playerIframe').src = '';
  document.getElementById('playerModal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlayBg').classList.remove('show');
}

function showStatus(text, hideAfter = 2000) {
  const bar = document.getElementById('statusBar');
  document.getElementById('statusText').textContent = text;
  bar.classList.add('show');
  if (hideAfter > 0) setTimeout(() => bar.classList.remove('show'), hideAfter);
}

function updateTimestamp() {
  const el = document.getElementById('lastUpdated');
  if (el) el.textContent = `${allVideos.length} vidéos • ${new Date().getHours()}h${String(new Date().getMinutes()).padStart(2,'0')}`;
}

function refreshAll() { loadAllVideos(); }

// Événements
document.getElementById('sidebarToggle').addEventListener('click', () => {
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('mainContent');
  const overlay = document.getElementById('overlayBg');
  if (window.innerWidth <= 768) {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  } else {
    sidebar.classList.toggle('hidden');
    main.classList.toggle('full');
  }
});

document.getElementById('searchBtn').addEventListener('click', filterVideos);
document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') filterVideos(); });
document.getElementById('refreshBtn').addEventListener('click', refreshAll);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Lancement
loadAllVideos();
</script>
</body>
</html>
